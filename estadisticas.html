<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Top Secret FC · Estadísticas</title>
<link rel="icon" href="Top-Secret.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --black:  #111111; --white:  #FFFFFF; --gray:   #F5F5F0;
  --gold:   #C9A84C; --gold2:  #E8C97A; --mid:    #888888; --border: #E5E5E0;
  --win:    #2a9d5c; --draw:   #d4a017; --loss:   #c0392b;
  --vpn:    #d4a017; --vpug:   #2a9d5c; --e11:    #2563eb;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--white); color: var(--black);
  font-family: 'Barlow', sans-serif; min-height: 100vh;
  margin-left: 64px; margin-right: 48px; padding-top: 64px;
}
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 64px; background: var(--black); border-bottom: 3px solid var(--gold);
  display: flex; align-items: center; padding: 0 24px 0 16px; gap: 0;
}
.tb-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; margin-right: auto; }
.tb-brand img { height: 80px; width: 120px; object-fit: contain; }
.tb-brand span { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: .12em; color: var(--white); text-transform: uppercase; }
.tb-badges { display: flex; align-items: center; gap: 40px; }
.tb-badges img { width: auto; object-fit: contain; opacity: .95; }
.tb-badges img[alt="EA FC 26"] { height: 100px; }
.tb-badges img[alt="Clubs Pro"] { height: 90px; }
.sidebar-left {
  position: fixed; top: 64px; left: 0; z-index: 100; width: 64px; height: calc(100vh - 64px);
  background: var(--black); border-right: 1px solid rgba(201,168,76,.15);
  display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 4px;
}
.sl-link {
  width: 44px; height: 44px; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  text-decoration: none; color: rgba(255,255,255,.35); transition: background .15s, color .15s;
}
.sl-link svg { width: 18px; height: 18px; }
.sl-link span { font-size: 8px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
.sl-link:hover { background: rgba(201,168,76,.1); color: rgba(255,255,255,.75); }
.sl-link.active { background: rgba(201,168,76,.12); color: var(--gold); }
.sidebar-right {
  position: fixed; top: 64px; right: 0; z-index: 100; width: 48px; height: calc(100vh - 64px);
  background: var(--white); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 8px;
}
.sr-icon {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; color: var(--mid); transition: color .15s;
  font-size: .75rem; font-weight: 700; letter-spacing: .06em;
}
.sr-icon:hover { color: var(--black); }
.page-header { max-width: 1100px; margin: 0 auto; padding: 56px 32px 24px; }
.ph-eyebrow { font-size: .7rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
.ph-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 900; line-height: .9; letter-spacing: -.01em; text-transform: uppercase; color: var(--black); }
.ph-title span { color: var(--gold); }
.ph-sub { font-size: .85rem; color: var(--mid); margin-top: 10px; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 32px 80px; }
.tabs { display: flex; gap: 0; margin-bottom: 36px; border-bottom: 2px solid var(--border); }
.tab {
  padding: 10px 24px; font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: .08em;
  color: var(--mid); background: none; border: none;
  cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .18s;
}
.tab:hover { color: var(--black); }
.tab.active { color: var(--black); border-bottom-color: var(--gold); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }
.tab[data-league="vpn"].active  { color: var(--vpn);  border-bottom-color: var(--vpn);  }
.tab[data-league="vpug"].active { color: var(--vpug); border-bottom-color: var(--vpug); }
.tab[data-league="e11"].active  { color: var(--e11);  border-bottom-color: var(--e11);  }
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.kpi { background: var(--gray); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 6px; padding: 18px 20px; }
.kpi-val { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; line-height: 1; color: var(--black); }
.kpi-lbl { font-size: .65rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--mid); margin-top: 4px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
.stat-grid.full { grid-template-columns: 1fr; }
.stat-block { background: var(--gray); border: 1px solid var(--border); border-top: 3px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; }
.stat-block.gold { border-top-color: var(--gold); }
.stat-block.vpn  { border-top-color: var(--vpn); }
.stat-block.vpug { border-top-color: var(--vpug); }
.stat-block.e11  { border-top-color: var(--e11); }
.sb-head { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--white); display: flex; align-items: center; gap: 8px; }
.sb-head h3 { font-family: 'Barlow Condensed', sans-serif; font-size: .88rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--black); }
.rank-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px; padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--white); }
.rank-row:last-child { border-bottom: none; }
.rank-row:hover { background: #fafaf6; }
.rk-pos { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 900; color: var(--mid); text-align: center; }
.rk-pos.p1 { color: var(--gold); } .rk-pos.p2 { color: #888; } .rk-pos.p3 { color: #a07040; }
.rk-name { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700; color: var(--black); }
.rk-sub { font-size: .68rem; color: var(--mid); margin-top: 2px; }
.rk-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.rk-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }
.rk-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 900; text-align: right; white-space: nowrap; color: var(--black); }
.result-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--white); }
.result-row:last-child { border-bottom: none; }
.result-row:hover { background: #fafaf6; }
.res-pill { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 900; flex-shrink: 0; }
.res-pill.W { background: rgba(42,157,92,.12); color: var(--win); }
.res-pill.D { background: rgba(212,160,23,.12); color: var(--draw); }
.res-pill.L { background: rgba(192,57,43,.12);  color: var(--loss); }
.res-info { flex: 1; min-width: 0; }
.res-rival { font-family: 'Barlow Condensed', sans-serif; font-size: .92rem; font-weight: 700; color: var(--black); }
.res-date { font-size: .68rem; color: var(--mid); margin-top: 2px; }
.res-score { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 900; color: var(--black); text-align: right; }
.res-league { font-size: .62rem; font-weight: 700; letter-spacing: .08em; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.res-league.vpn  { background: rgba(212,160,23,.1);  color: var(--vpn);  }
.res-league.vpug { background: rgba(42,157,92,.1);   color: var(--vpug); }
.res-league.e11  { background: rgba(37,99,235,.1);   color: var(--e11);  }
footer { background: var(--black); color: #555; text-align: center; padding: 28px 24px; font-size: .75rem; letter-spacing: .1em; margin-left: -64px; margin-right: -48px; }
footer span { color: var(--gold); }
@media (max-width: 700px) {
  body { margin-left: 0; margin-right: 0; }
  .sidebar-left, .sidebar-right { display: none; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .stat-grid { grid-template-columns: 1fr; }
  .wrap { padding: 0 16px 60px; }
  .page-header { padding: 24px 16px 16px; }
}
</style>
</head>

<script>
function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById('pane-' + id);
  pane.classList.add('active');
  gsap.from(pane.querySelectorAll('.stat-block, .kpi'), {
    opacity:0, y:20, duration:0.4, stagger:0.06, ease:'power2.out'
  });
}
gsap.set('.ph-eyebrow, .ph-title, .ph-sub', {opacity:0, y:16});
gsap.to('.ph-eyebrow', {opacity:1, y:0, duration:0.5, ease:'power2.out', delay:0.05});
gsap.to('.ph-title',   {opacity:1, y:0, duration:0.6, ease:'power3.out', delay:0.12});
gsap.to('.ph-sub',     {opacity:1, y:0, duration:0.5, ease:'power2.out', delay:0.2});
</script>

<script type="module">
import { SEED_MATCHES } from './seed_matches.js';

const ROSTER_POSN = {
  'Woolfyboyzx2':'POR','Zurdo-_CABJ12':'DEF','Agubostero7':'DEF','Alexiisraiies23':'DEF',
  'RS32-DaniStone':'MED','Juan_Martinez4':'MED','CipriMancini':'MED','Buraa07':'MED','Guiidow':'MED',
  'Huber236':'LAT','zPibu__':'LAT','BlackPanther-CG':'DEL','cansitrGd22_':'DEL','Lautavester7':'DEL','Lucasmati_akd':'DEL',
};
const M_NAMES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function parseScore(s) {
  const p = String(s||'0-0').split('-').map(Number);
  return [p[0]||0, p[1]||0];
}
function matchOutcome(s) {
  const [gf,gc] = parseScore(s);
  return gf > gc ? 'W' : (gf === gc ? 'D' : 'L');
}
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d+'T12:00:00');
  return dt.getDate() + ' ' + M_NAMES[dt.getMonth()] + ' ' + dt.getFullYear();
}

function computeFor(matches) {
  let wins=0, goals=0;
  const allRatings=[], ps={};
  matches.forEach(m => {
    const [gf] = parseScore(m.match_result);
    if (matchOutcome(m.match_result)==='W') wins++;
    goals += gf;
    m.players.forEach(p => {
      const k = p.matched || p.name;
      if (!ps[k]) ps[k]={pj:0,g:0,a:0,ratings:[]};
      ps[k].pj++; ps[k].g+=(p.goals||0); ps[k].a+=(p.assists||0);
      if (p.rating!=null){ps[k].ratings.push(p.rating); allRatings.push(p.rating);}
    });
  });
  Object.keys(ps).forEach(k=>{
    const p=ps[k];
    p.avgRating = p.ratings.length ? +(p.ratings.reduce((a,b)=>a+b,0)/p.ratings.length).toFixed(2) : 0;
  });
  const avgRat = allRatings.length ? (allRatings.reduce((a,b)=>a+b,0)/allRatings.length).toFixed(2) : '—';
  return {pj:matches.length, wins, goals, avgRat, players:ps};
}

function topN(ps, fn, n=5) {
  return Object.entries(ps)
    .filter(([,s])=>fn(s)>0)
    .sort(([,a],[,b])=>fn(b)-fn(a))
    .slice(0,n)
    .map(([k,s])=>({key:k, val:fn(s), pos:ROSTER_POSN[k]||'', pj:s.pj}));
}

function kpiHtml(data, color='var(--gold)') {
  return `
    <div class="kpi" style="border-left-color:${color}"><div class="kpi-val">${data.pj}</div><div class="kpi-lbl">Partidos</div></div>
    <div class="kpi" style="border-left-color:${color}"><div class="kpi-val">${data.wins}</div><div class="kpi-lbl">Victorias</div></div>
    <div class="kpi" style="border-left-color:${color}"><div class="kpi-val">${data.goals}</div><div class="kpi-lbl">Goles</div></div>
    <div class="kpi" style="border-left-color:${color}"><div class="kpi-val">${data.avgRat}</div><div class="kpi-lbl">Rating prom.</div></div>`;
}

function rankBlockHtml(title, rows, accentClass, barColor='var(--gold)') {
  const posClass = ['p1','p2','p3'];
  const rowsHtml = rows.map((r,i)=>{
    const dispVal = typeof r.val==='number'&&r.val%1!==0 ? r.val.toFixed(2) : r.val;
    const pct = rows[0].val > 0 ? Math.round(r.val/rows[0].val*100) : 0;
    return `<div class="rank-row">
      <div class="rk-pos ${posClass[i]||''}">${i+1}</div>
      <div>
        <div class="rk-name">${r.key}</div>
        <div class="rk-sub">${r.pos} · ${r.pj} PJ</div>
        <div class="rk-bar"><div class="rk-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
      <div class="rk-val">${dispVal}</div>
    </div>`;
  }).join('');
  return `<div class="stat-block ${accentClass}"><div class="sb-head"><h3>${title}</h3></div>${rowsHtml}</div>`;
}

function resultsBlockHtml(matches, accentClass) {
  const pillLbl = {W:'V',D:'E',L:'D'};
  const leagueCls = {'VPN':'vpn','VPUG':'vpug','11x11':'e11'};
  const last = [...matches].reverse().slice(0,8);
  const rowsHtml = last.map(m=>{
    const out = matchOutcome(m.match_result);
    const [gf,gc] = parseScore(m.match_result);
    const ligCls = leagueCls[m.league||'']||'';
    return `<div class="result-row">
      <div class="res-pill ${out}">${pillLbl[out]}</div>
      <div class="res-info"><div class="res-rival">${m.rival||'—'}</div><div class="res-date">${fmtDate(m.date)}</div></div>
      <span class="res-league ${ligCls}">${m.league||''}</span>
      <div class="res-score">${gf} – ${gc}</div>
    </div>`;
  }).join('');
  return `<div class="stat-block ${accentClass}"><div class="sb-head"><h3>Resultados recientes</h3></div>${rowsHtml}</div>`;
}

/* ── DATA ── */
const all  = SEED_MATCHES;
const vpn  = SEED_MATCHES.filter(m=>m.league==='VPN');
const vpug = SEED_MATCHES.filter(m=>m.league==='VPUG');
const e11  = SEED_MATCHES.filter(m=>m.league==='11x11');

const dAll  = computeFor(all);
const dVpn  = computeFor(vpn);
const dVpug = computeFor(vpug);
const dE11  = computeFor(e11);

/* ── FILL GENERAL ── */
document.getElementById('kpi-all').innerHTML = kpiHtml(dAll);
const topGAll  = topN(dAll.players, s=>s.g);
const topAAll  = topN(dAll.players, s=>s.a);
const topRAll  = topN(dAll.players, s=>s.pj>=3?s.avgRating:0);
const topPjAll = topN(dAll.players, s=>s.pj);
document.getElementById('grid-all-top').innerHTML =
  rankBlockHtml('Goleadores', topGAll, 'gold') +
  rankBlockHtml('Asistidores', topAAll, 'gold');
document.getElementById('grid-all-bot').innerHTML =
  rankBlockHtml('Rating promedio', topRAll, 'gold') +
  rankBlockHtml('Regularidad (PJ)', topPjAll, 'gold');
document.getElementById('grid-all-results').innerHTML = resultsBlockHtml(all, 'gold');

/* ── FILL VPN ── */
document.getElementById('kpi-vpn').innerHTML = kpiHtml(dVpn, 'var(--vpn)');
document.getElementById('grid-vpn').innerHTML =
  rankBlockHtml('Goleadores VPN', topN(dVpn.players,s=>s.g), 'vpn', 'var(--vpn)') +
  resultsBlockHtml(vpn, 'vpn');

/* ── FILL VPUG ── */
document.getElementById('kpi-vpug').innerHTML = kpiHtml(dVpug, 'var(--vpug)');
document.getElementById('grid-vpug').innerHTML =
  rankBlockHtml('Goleadores VPUG', topN(dVpug.players,s=>s.g), 'vpug', 'var(--vpug)') +
  resultsBlockHtml(vpug, 'vpug');

/* ── FILL 11x11 ── */
document.getElementById('kpi-e11').innerHTML = kpiHtml(dE11, 'var(--e11)');
document.getElementById('grid-e11').innerHTML =
  rankBlockHtml('Goleadores 11x11', topN(dE11.players,s=>s.g), 'e11', 'var(--e11)') +
  resultsBlockHtml(e11, 'e11');

/* ── SCROLL REVEAL ── */
gsap.set('.kpi, .stat-block', {opacity:0, y:22});
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    gsap.to(e.target, {opacity:1, y:0, duration:0.45, ease:'power2.out'});
    io.unobserve(e.target);
  });
}, {threshold:0.1});
document.querySelectorAll('.kpi, .stat-block').forEach(el => io.observe(el));
</script>
