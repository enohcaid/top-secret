<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias — Top Secret FC</title>
  <link rel="icon" href="Top-Secret.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #111111;
      --white:  #FFFFFF;
      --gray:   #F5F5F0;
      --gold:   #C9A84C;
      --gold2:  #E8C97A;
      --mid:    #888888;
      --border: #E5E5E0;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--white);
      color: var(--black);
      padding-left: 64px;
      padding-right: 48px;
      padding-top: 64px;
      min-height: 100vh;
    }

    /* ── Page wrapper ── */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
      line-height: 1;
    }
    .page-header h1 span { color: var(--gold); }
    .page-header p {
      margin-top: 8px;
      color: var(--mid);
      font-size: .9rem;
    }

    /* ── Featured card ── */
    .featured-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--black);
      border-radius: 4px;
      overflow: hidden;
      min-height: 420px;
      margin-bottom: 56px;
      position: relative;
    }
    @media (max-width: 760px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-photo { min-height: 260px; order: -1; }
    }
    .featured-text {
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }
    .featured-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .pill-pinned {
      background: var(--gold);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 2px;
    }
    .pill-cat {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }
    .featured-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #FFFFFF;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .featured-date {
      font-size: .8rem;
      color: rgba(255,255,255,.35);
      margin-bottom: 20px;
    }
    .featured-excerpt {
      font-size: .95rem;
      line-height: 1.6;
      color: rgba(255,255,255,.7);
      margin-bottom: 32px;
    }
    .featured-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: var(--gold);
      color: var(--black);
      border: none;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 3px;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--gold2); }
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.2);
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 3px;
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    .featured-photo {
      position: relative;
      overflow: hidden;
    }
    .featured-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .featured-photo-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #111111 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── Section heading ── */
    .section-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--black);
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .section-heading span { color: var(--gold); }

    /* ── News grid ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .news-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .news-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }
    .news-card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--gray);
    }
    .news-card-body { padding: 18px 20px; }
    .news-card-cat {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .news-card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .news-card-date {
      font-size: .75rem;
      color: var(--mid);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--mid);
    }
    .empty-state p { font-size: .95rem; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      overflow-y: auto;
      padding: 40px 20px;
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    /* ── Article modal ── */
    .article-modal {
      background: var(--white);
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 760px;
      position: relative;
    }
    .article-modal-img {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .article-modal-body { padding: 36px 40px 48px; }
    .article-modal-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .article-modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .03em;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .article-modal-date {
      font-size: .8rem;
      color: var(--mid);
      margin-bottom: 28px;
    }
    .article-modal-content p {
      font-size: 1rem;
      line-height: 1.75;
      color: #333;
      margin-bottom: 16px;
    }
    .article-modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 10;
    }

    /* ── Share modal ── */
    .share-modal {
      background: var(--white);
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 560px;
      position: relative;
    }
    .share-modal-header {
      background: var(--black);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .share-modal-header h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #fff;
    }
    .share-modal-header h2 span { color: var(--gold); }
    .share-modal-body { padding: 24px; }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #111;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .canvas-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .canvas-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .share-caption-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 8px;
    }
    .share-caption {
      width: 100%;
      min-height: 100px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: 'Barlow', sans-serif;
      font-size: .88rem;
      line-height: 1.5;
      color: var(--black);
      resize: vertical;
      margin-bottom: 16px;
    }
    .share-caption:focus { outline: none; border-color: var(--gold); }

    .share-platforms {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .share-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--border);
      background: var(--white);
      border-radius: 4px;
      padding: 10px 6px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--black);
    }
    .share-btn:hover { border-color: var(--gold); background: #fffdf5; }
    .share-btn svg { width: 22px; height: 22px; }
    .share-btn-download { grid-column: span 2; flex-direction: row; gap: 8px; padding: 12px; }
    .share-btn-copy { flex-direction: row; gap: 6px; }
    .share-footer-row { display: flex; gap: 8px; }
    .share-footer-row .share-btn { flex: 1; }
  </style>
</head>
<body>

<script src="noticias-data.js"></script>
<script src="layout.js?v=3"></script>

<div class="page-wrap">

  <!-- Page header -->
  <div class="page-header">
    <h1>Noti<span>cias</span></h1>
    <p>Novedades y comunicados del club</p>

  <!-- Featured card injected by JS -->

</div>

<!-- Article modal -->

</div>

<!-- Share modal -->

      <div class="share-platforms">

          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
          Instagram

<script src="mobile-nav.js?v=3"></script>
<script>
// NOTICIAS data is loaded from noticias-data.js
// Auto-generated result news populated by the module script below
window._AUTO_NEWS = [];

// ── SHARE STATE ──────────────────────────────────────────────────────────────
let _shareNews = null;
const BASE_URL = 'https://enohcaid.github.io/top-secret/noticias.html';

// ── RENDER ───────────────────────────────────────────────────────────────────
function allNews() {
  return [...NOTICIAS, ...(window._AUTO_NEWS || [])];
}

function findNews(id) {
  return allNews().find(x => x.id === id);
}

function formatDate(iso) {
  const n = allNews().find(x => x.date === iso);
  if (n && n.dateLabel) return n.dateLabel;
  const [y, m, d] = iso.split('-').map(Number);
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${months[m - 1]} de ${y}`;
}

function renderFeatured(n) {
  const slot = document.getElementById('featured-slot');
  slot.innerHTML = `
    <div class="featured-card">
      <div class="featured-text">
        <div class="featured-eyebrow">
          <span class="pill-pinned">📌 Fijado</span>
          <span class="pill-cat">${n.category}</span>
        </div>
        <h2 class="featured-title">${n.title}</h2>
        <div class="featured-date">${n.dateLabel || formatDate(n.date)}</div>
        <p class="featured-excerpt">${n.excerpt}</p>
        <div class="featured-actions">
          <button class="btn-primary" onclick="openArticle('${n.id}')">Leer noticia</button>
          <button class="btn-secondary" onclick="openShare('${n.id}')">Compartir</button>
        </div>
      </div>
      <div class="featured-photo">
        <img src="${n.image}" alt="${n.title}" onerror="this.parentElement.style.background='#1a1a1a'">
        <div class="featured-photo-gradient"></div>
      </div>
    </div>
  `;
}

function renderGrid(items) {
  if (!items.length) return;
  const wrap = document.getElementById('other-news-wrap');
  const grid = document.getElementById('news-grid');
  wrap.style.display = 'block';
  grid.innerHTML = items.map(n => `
    <div class="news-card" onclick="openArticle('${n.id}')">
      <img class="news-card-img" src="${n.image}" alt="${n.title}" onerror="this.style.background='var(--gray)'">
      <div class="news-card-body">
        <div class="news-card-cat">${n.category}</div>
        <div class="news-card-title">${n.title}</div>
        <div class="news-card-date">${n.dateLabel || formatDate(n.date)}</div>
      </div>
    </div>
  `).join('');
}

function init() {
  const pinned = NOTICIAS.find(n => n.pinned);
  if (pinned) renderFeatured(pinned);
  const rest = NOTICIAS.filter(n => !n.pinned);
  renderGrid(rest);
}

function renderAutoSection(items) {
  if (!items || !items.length) return;
  const existingIds = new Set(NOTICIAS.map(n => n.id));
  const newItems = items.filter(n => !existingIds.has(n.id));
  if (!newItems.length) return;
  const wrap = document.getElementById('other-news-wrap');
  const grid = document.getElementById('news-grid');
  wrap.style.display = 'block';
  grid.innerHTML += newItems.map(n => `
    <div class="news-card" onclick="openArticle('${n.id}')">
      ${n.image ? `<img class="news-card-img" src="${n.image}" alt="${n.title}" onerror="this.style.background='var(--gray)';this.style.display='none'">` : '<div class="news-card-img" style="background:var(--black);display:flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-size:1.1rem;font-weight:900;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.1em;">Resultados</div>'}
      <div class="news-card-body">
        <div class="news-card-cat">${n.category}</div>
        <div class="news-card-title">${n.title}</div>
        <div class="news-card-date">${n.dateLabel || formatDate(n.date)}</div>
      </div>
    </div>
  `).join('');
}

// ── ARTICLE MODAL ─────────────────────────────────────────────────────────────
function openArticle(id) {
  const n = findNews(id);
  if (!n) return;
  if (location.hash !== '#' + id) history.pushState({ articleId: id }, '', '#' + id);
  document.getElementById('am-img').src = n.image;
  document.getElementById('am-img').alt = n.title;
  document.getElementById('am-eyebrow').innerHTML = `
    <span class="pill-pinned" style="${n.pinned ? '' : 'display:none'}">${n.pinned ? '📌 Fijado' : ''}</span>
    <span class="pill-cat">${n.category}</span>
  `;
  document.getElementById('am-title').textContent = n.title;
  document.getElementById('am-date').textContent = n.dateLabel || formatDate(n.date);
  document.getElementById('am-content').innerHTML = n.body.map(p => `<p>${p}</p>`).join('');
  document.getElementById('am-actions').innerHTML = `
    <button class="btn-primary" onclick="closeArticle(); openShare('${n.id}')">Compartir</button>
    <button class="btn-secondary" onclick="copyLink('${n.id}')">Copiar link</button>
  `;
  document.getElementById('article-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeArticle() {
  if (location.hash) history.pushState(null, '', location.pathname + location.search);
  document.getElementById('article-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function copyLink(id) {
  const url = BASE_URL + '#' + id;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.currentTarget;
    const orig = btn.textContent;
    btn.textContent = '¡Link copiado!';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  });
}

window.addEventListener('popstate', function () {
  const id = location.hash.slice(1);
  if (id) {
    const n = findNews(id);
    if (n) openArticle(id);
  } else {
    document.getElementById('article-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ── SHARE MODAL ──────────────────────────────────────────────────────────────
function openShare(id) {
  const n = findNews(id);
  if (!n) return;
  _shareNews = n;
  document.getElementById('share-caption').value = n.shareCaption || `${n.title}\n\n${BASE_URL}`;
  document.getElementById('canvas-loading').style.display = 'flex';
  document.getElementById('share-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  buildShareCanvas(n);
}

function closeShare() {
  document.getElementById('share-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _shareNews = null;
}

// ── CANVAS GENERATOR ─────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      cy += lineH;
      line = word;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, cy); cy += lineH; }
  return cy;
}

async function renderCanvas(ctx, n, W, H) {
  const scale = Math.min(W, H) / 1080;
  const PAD = Math.round(108 * W / 1080); // 10% safe zone

  // Background
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, H);

  // Photo — top 52%, no text over it
  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise(resolve => { img.onload = resolve; img.onerror = resolve; img.src = n.image; });

  const photoH = Math.round(H * 0.52);
  if (img.naturalWidth) {
    const sc = Math.max(W / img.naturalWidth, photoH / img.naturalHeight);
    const sw = W / sc, sh = photoH / sc;
    const sx = (img.naturalWidth - sw) / 2;
    ctx.drawImage(img, sx, 0, sw, sh, 0, 0, W, photoH);
  }

  // Subtle vignette at bottom of photo
  const vig = ctx.createLinearGradient(0, photoH * 0.65, 0, photoH);
  vig.addColorStop(0, 'rgba(17,17,17,0)');
  vig.addColorStop(1, 'rgba(17,17,17,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, photoH * 0.65, W, photoH * 0.35);

  // Gold top bar
  ctx.fillStyle = '#C9A84C';
  ctx.fillRect(0, 0, W, Math.max(6, Math.round(10 * scale)));

  // Gold separator line at photo/text boundary
  const sepH = Math.max(3, Math.round(4 * scale));
  ctx.fillStyle = '#C9A84C';
  ctx.fillRect(0, photoH, W, sepH);

  // ── Text area (solid dark, below photo) ─────────────────────────
  await document.fonts.load(`900 ${Math.round(78 * scale)}px "Barlow Condensed"`);
  await document.fonts.load(`800 ${Math.round(24 * scale)}px "Barlow Condensed"`);
  await document.fonts.load(`400 ${Math.round(26 * scale)}px Barlow`);

  let y = photoH + sepH + Math.round(36 * scale);

  // Category pill
  const catFs = Math.round(22 * scale);
  ctx.font = `800 ${catFs}px "Barlow Condensed"`;
  ctx.letterSpacing = `${Math.round(3 * scale)}px`;
  const catText = n.category.toUpperCase();
  const catTxtW = ctx.measureText(catText).width;
  const pillPad = Math.round(14 * scale);
  const pillH = Math.round(30 * scale);
  ctx.fillStyle = '#C9A84C';
  ctx.beginPath();
  ctx.roundRect(PAD, y, catTxtW + pillPad * 2, pillH, 3);
  ctx.fill();
  ctx.fillStyle = '#111111';
  ctx.textBaseline = 'middle';
  ctx.fillText(catText, PAD + pillPad, y + pillH / 2);
  y += pillH + Math.round(22 * scale);
  ctx.letterSpacing = '0px';
  ctx.textBaseline = 'top';

  // Title
  const titleLen = n.title.length;
  const fs = titleLen <= 25 ? Math.round(78 * scale)
           : titleLen <= 40 ? Math.round(66 * scale)
           : titleLen <= 55 ? Math.round(56 * scale)
           : Math.round(48 * scale);
  ctx.font = `900 ${fs}px "Barlow Condensed"`;
  ctx.fillStyle = '#FFFFFF';
  y = wrapText(ctx, n.title.toUpperCase(), PAD, y, W - PAD * 2, fs * 1.08);
  y += Math.round(14 * scale);

  // Date
  ctx.font = `400 ${Math.round(24 * scale)}px Barlow`;
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.fillText(n.dateLabel || n.date, PAD, y);

  // Footer
  const ruleY = H - Math.round(90 * scale);
  ctx.fillStyle = 'rgba(201,168,76,0.30)';
  ctx.fillRect(PAD, ruleY, W - PAD * 2, 1);

  ctx.font = `900 ${Math.round(40 * scale)}px "Barlow Condensed"`;
  ctx.fillStyle = '#FFFFFF';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('TOP SECRET FC', PAD, H - Math.round(50 * scale));

  ctx.font = `700 ${Math.round(24 * scale)}px "Barlow Condensed"`;
  ctx.fillStyle = '#C9A84C';
  ctx.letterSpacing = `${Math.round(2 * scale)}px`;
  ctx.fillText('PRIMERA DIVISIÓN · VPN', PAD, H - Math.round(22 * scale));
  ctx.letterSpacing = '0px';

  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.textAlign = 'right';
  ctx.fillText('★ ★ ★', W - PAD, H - Math.round(22 * scale));
  ctx.textAlign = 'left';
}

async function buildShareCanvas(n) {
  const canvas = document.getElementById('share-canvas');
  canvas.width = 1080; canvas.height = 1080;
  await renderCanvas(canvas.getContext('2d'), n, 1080, 1080);
  document.getElementById('canvas-loading').style.display = 'none';
}

async function downloadForPlatform(n, w, h, filename) {
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  await renderCanvas(off.getContext('2d'), n, w, h);
  const a = document.createElement('a');
  a.download = filename;
  a.href = off.toDataURL('image/png');
  a.click();
}

// ── SHARE ACTIONS ────────────────────────────────────────────────────────────
function getCaption() {
  return document.getElementById('share-caption').value;
}

function platformCaption(key) {
  if (!_shareNews) return '';
  const base = (_shareNews.shareCaptions || {})[key] || _shareNews.shareCaption || '';
  const url = BASE_URL + '#' + _shareNews.id;
  return base + '\n\n🔗 ' + url;
}

function copyAndFlash(btn, text, label) {
  navigator.clipboard.writeText(text).catch(() => {});
  document.getElementById('share-caption').value = text;
  const orig = btn.innerHTML;
  btn.innerHTML = orig.replace(label, '✓ Copiado');
  setTimeout(() => { btn.innerHTML = orig; }, 2000);
}

async function shareIG() {
  const btn = event.currentTarget;
  const cap = platformCaption('ig');
  copyAndFlash(btn, cap, 'Instagram');
  await downloadForPlatform(_shareNews, 1080, 1080, 'top-secret-fc-ig.png');
}

async function shareX() {
  const btn = event.currentTarget;
  const cap = platformCaption('x');
  copyAndFlash(btn, cap, 'X / Twitter');
  await downloadForPlatform(_shareNews, 1200, 675, 'top-secret-fc-x.png');
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(cap), '_blank');
}

async function shareFB() {
  const btn = event.currentTarget;
  const cap = platformCaption('fb');
  copyAndFlash(btn, cap, 'Facebook');
  await downloadForPlatform(_shareNews, 1200, 628, 'top-secret-fc-fb.png');
  window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(BASE_URL + '#' + _shareNews.id), '_blank');
}

async function shareAll() {
  await webShareAction();
}

function downloadImg() {
  const canvas = document.getElementById('share-canvas');
  const link = document.createElement('a');
  link.download = 'top-secret-fc-noticia.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function webShareAction() {
  const canvas = document.getElementById('share-canvas');
  try {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const file = new File([blob], 'top-secret-fc.png', { type: 'image/png' });
    await navigator.share({
      title: _shareNews ? _shareNews.title : 'Top Secret FC',
      text: getCaption(),
      files: [file],
    });
  } catch (e) {
    downloadImg();
  }
}

function copyCaption() {
  const txt = getCaption();
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.currentTarget;
    const orig = btn.innerHTML;
    btn.innerHTML = btn.innerHTML.replace('Copiar texto', '¡Copiado!');
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

// ── CLOSE ON BACKDROP ────────────────────────────────────────────────────────
document.getElementById('article-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeArticle();
});
document.getElementById('share-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeShare();
});

init();
const _initHash = location.hash.slice(1);
if (_initHash && findNews(_initHash)) openArticle(_initHash);
</script>
