<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias — Top Secret FC</title>
  <link rel="icon" href="Top-Secret.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #111111;
      --white:  #FFFFFF;
      --gray:   #1C1C1C;
      --gold:   #C9A84C;
      --gold2:  #E8C97A;
      --mid:    rgba(255,255,255,.4);
      --border: rgba(255,255,255,.09);
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--text, #F0F2F8);
      padding-left: 64px;
      padding-right: 48px;
      padding-top: 64px;
      min-height: 100vh;
    }

    /* ── Page wrapper ── */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
      line-height: 1;
    }
    .page-header h1 span { color: var(--gold); }
    .page-header p {
      margin-top: 8px;
      color: var(--mid);
      font-size: .9rem;
    }

    /* ── Featured card ── */
    .featured-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--black);
      border-radius: 4px;
      overflow: hidden;
      min-height: 420px;
      margin-bottom: 56px;
      position: relative;
    }
    @media (max-width: 760px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-photo { min-height: 260px; order: -1; }
    }
    .featured-text {
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }
    .featured-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .pill-pinned {
      background: var(--gold);
      color: var(--text, #F0F2F8);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 2px;
    }
    .pill-cat {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }
    .featured-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #FFFFFF;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .featured-date {
      font-size: .8rem;
      color: rgba(255,255,255,.35);
      margin-bottom: 20px;
    }
    .featured-excerpt {
      font-size: .95rem;
      line-height: 1.6;
      color: rgba(255,255,255,.7);
      margin-bottom: 32px;
    }
    .featured-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: var(--gold);
      color: var(--text, #F0F2F8);
      border: none;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 3px;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--gold2); }
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,.65);
      border: 1px solid rgba(255,255,255,.2);
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 3px;
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    .featured-photo {
      position: relative;
      overflow: hidden;
    }
    .featured-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .featured-photo-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #111111 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── Section heading ── */
    .section-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text, #F0F2F8);
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .section-heading span { color: var(--gold); }

    /* ── News grid ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .news-card {
      background: var(--gray);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .news-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
    .news-card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--gray);
    }
    .news-card.portrait {
      display: grid;
      grid-template-columns: 42% 1fr;
    }
    .news-card.portrait .news-card-img {
      height: 100%;
      min-height: 200px;
    }
    .news-card-body { padding: 18px 20px; }
    .news-card-cat {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .news-card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .news-card-date {
      font-size: .75rem;
      color: var(--mid);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--mid);
    }
    .empty-state p { font-size: .95rem; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      overflow-y: auto;
      padding: 40px 20px;
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    /* ── Article modal ── */
    .article-modal {
      background: var(--gray);
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 1000px;
      max-height: 92vh;
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }
    .article-modal-img-col {
      flex: 0 0 52%;
      background: #111;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
    }
    .article-modal-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .article-modal-body {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 32px 36px 44px;
    }
    .article-modal-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .article-modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .03em;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .article-modal-date {
      font-size: .8rem;
      color: var(--mid);
      margin-bottom: 28px;
    }
    .article-modal-content p {
      font-size: 1rem;
      line-height: 1.75;
      color: #333;
      margin-bottom: 16px;
    }
    .article-modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      z-index: 10;
    }

    .article-modal.landscape { flex-direction: column; max-width: 680px; }
    .article-modal.landscape .article-modal-img-col { flex: none; width: 100%; height: 340px; }

    @media (max-width: 700px) {
      .article-modal { flex-direction: column; max-height: none; }
      .article-modal-img-col { flex: none; width: 100%; height: 55vw; min-height: 200px; }
      .article-modal-img { object-fit: cover; }
    }

    /* ── Share modal ── */
    .share-modal {
      background: var(--gray);
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      max-width: 560px;
      position: relative;
    }
    .share-modal-header {
      background: var(--black);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .share-modal-header h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #fff;
    }
    .share-modal-header h2 span { color: var(--gold); }
    .share-modal-body { padding: 24px; }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #111;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .canvas-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .canvas-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .share-caption-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 8px;
    }
    .share-caption {
      width: 100%;
      min-height: 100px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: 'Barlow', sans-serif;
      font-size: .88rem;
      line-height: 1.5;
      color: var(--text, #F0F2F8);
      resize: vertical;
      margin-bottom: 16px;
    }
    .share-caption:focus { outline: none; border-color: var(--gold); }

    .share-platforms {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .share-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--border);
      background: var(--gray);
      border-radius: 4px;
      padding: 10px 6px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text, #F0F2F8);
    }
    .share-btn:hover { border-color: var(--gold); background: #fffdf5; }
    .share-btn svg { width: 22px; height: 22px; }
    .share-btn-download { grid-column: span 2; flex-direction: row; gap: 8px; padding: 12px; }
    .share-btn-copy { flex-direction: row; gap: 6px; }
    .share-footer-row { display: flex; gap: 8px; }
    .share-footer-row .share-btn { flex: 1; }
  </style>
</head>

<script src="noticias-data.js"></script>

<script>
// NOTICIAS data is loaded from noticias-data.js
// Auto-generated result news populated by the module script below
window._AUTO_NEWS = [];

// ── SHARE STATE ──────────────────────────────────────────────────────────────
let _shareNews = null;
const BASE_URL = 'https://enohcaid.github.io/top-secret/noticias.html';

// ── RENDER ───────────────────────────────────────────────────────────────────
function allNews() {
  return [...NOTICIAS, ...(window._AUTO_NEWS || [])];
}

function findNews(id) {
  return allNews().find(x => x.id === id);
}

function formatDate(iso) {
  const n = allNews().find(x => x.date === iso);
  if (n && n.dateLabel) return n.dateLabel;
  const [y, m, d] = iso.split('-').map(Number);
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d} de ${months[m - 1]} de ${y}`;
}

function renderFeatured(n) {
  const slot = document.getElementById('featured-slot');
  slot.innerHTML = `
    <div class="featured-card">
      <div class="featured-text">
        <div class="featured-eyebrow">
          <span class="pill-pinned">📌 Fijado</span>
          <span class="pill-cat">${n.category}</span>
        </div>
        <h2 class="featured-title">${n.title}</h2>
        <div class="featured-date">${n.dateLabel || formatDate(n.date)}</div>
        <p class="featured-excerpt">${n.excerpt}</p>
        <div class="featured-actions">
          <button class="btn-primary" onclick="openArticle('${n.id}')">Leer noticia</button>
          <button class="btn-secondary" onclick="openShare('${n.id}')">Compartir</button>
        </div>
      </div>
      <div class="featured-photo">
        <img src="${n.image}" alt="${n.title}" onerror="this.parentElement.style.background='#1a1a1a'">
        <div class="featured-photo-gradient"></div>
      </div>
    </div>
  `;
}

function renderGrid(items) {
  if (!items.length) return;
  const wrap = document.getElementById('other-news-wrap');
  const grid = document.getElementById('news-grid');
  wrap.style.display = 'block';
  grid.innerHTML = items.map(n => `
    <div class="news-card" onclick="openArticle('${n.id}')">
      <img class="news-card-img" src="${n.image}" alt="${n.title}" onload="if(this.naturalHeight>this.naturalWidth)this.closest('.news-card').classList.add('portrait')" onerror="this.style.background='var(--gray)'">
      <div class="news-card-body">
        <div class="news-card-cat">${n.category}</div>
        <div class="news-card-title">${n.title}</div>
        <div class="news-card-date">${n.dateLabel || formatDate(n.date)}</div>
      </div>
    </div>
  `).join('');
}

function init() {
  const pinned = NOTICIAS.find(n => n.pinned);
  if (pinned) renderFeatured(pinned);
  const rest = NOTICIAS.filter(n => n !== pinned);
  renderGrid(rest);
}

function renderAutoSection(items) {
  if (!items || !items.length) return;
  const existingIds = new Set(NOTICIAS.map(n => n.id));
  const autoItems = items.filter(n => !existingIds.has(n.id));
  if (!autoItems.length) return;

  // Merge noticias manuales (no pinned) con auto-news y ordenar por fecha desc
  const pinned = NOTICIAS.find(n => n.pinned);
  const nonPinned = NOTICIAS.filter(n => n !== pinned);
  const merged = [...nonPinned, ...autoItems].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const wrap = document.getElementById('other-news-wrap');
  const grid = document.getElementById('news-grid');
  wrap.style.display = 'block';
  grid.innerHTML = merged.map(n => `
    <div class="news-card" onclick="openArticle('${n.id}')">
      ${n.image ? `<img class="news-card-img" src="${n.image}" alt="${n.title}" onload="if(this.naturalHeight>this.naturalWidth)this.closest('.news-card').classList.add('portrait')" onerror="this.style.background='var(--gray)';this.style.display='none'">` : '<div class="news-card-img" style="background:var(--black);display:flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-size:1.1rem;font-weight:900;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.1em;">Resultados</div>'}
      <div class="news-card-body">
        <div class="news-card-cat">${n.category}</div>
        <div class="news-card-title">${n.title}</div>
        <div class="news-card-date">${n.dateLabel || formatDate(n.date)}</div>
      </div>
    </div>
  `).join('');
}

// ── ARTICLE MODAL ─────────────────────────────────────────────────────────────
function openArticle(id) {
  const n = findNews(id);
  if (!n) return;
  if (location.hash !== '#' + id) history.pushState({ articleId: id }, '', '#' + id);
  const amModal = document.getElementById('article-modal');
  const amImg   = document.getElementById('am-img');
  amModal.classList.remove('landscape');
  amImg.onload = function() {
    if (this.naturalWidth > this.naturalHeight) amModal.classList.add('landscape');
  };
  amImg.src = n.image;
  amImg.alt = n.title;
  document.getElementById('am-eyebrow').innerHTML = `
    <span class="pill-pinned" style="${n.pinned ? '' : 'display:none'}">${n.pinned ? '📌 Fijado' : ''}</span>
    <span class="pill-cat">${n.category}</span>
  `;
  document.getElementById('am-title').textContent = n.title;
  document.getElementById('am-date').textContent = n.dateLabel || formatDate(n.date);
  document.getElementById('am-content').innerHTML = n.body.map(p => `<p>${p}</p>`).join('');
  document.getElementById('am-actions').innerHTML = `
    <button class="btn-primary" onclick="closeArticle(); openShare('${n.id}')">Compartir</button>
    <button class="btn-secondary" onclick="copyLink('${n.id}')">Copiar link</button>
  `;
  document.getElementById('article-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeArticle() {
  if (location.hash) history.pushState(null, '', location.pathname + location.search);
  document.getElementById('article-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function copyLink(id) {
  const url = BASE_URL + '#' + id;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.currentTarget;
    const orig = btn.textContent;
    btn.textContent = '¡Link copiado!';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  });
}

window.addEventListener('popstate', function () {
  const id = location.hash.slice(1);
  if (id) {
    const n = findNews(id);
    if (n) openArticle(id);
  } else {
    document.getElementById('article-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ── SHARE MODAL ──────────────────────────────────────────────────────────────
function openShare(id) {
  const n = findNews(id);
  if (!n) return;
  _shareNews = n;
  document.getElementById('share-caption').value = n.shareCaption || `${n.title}\n\n${BASE_URL}`;
  document.getElementById('canvas-loading').style.display = 'flex';
  document.getElementById('share-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  buildShareCanvas(n);
}

function closeShare() {
  document.getElementById('share-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _shareNews = null;
}

// ── IMAGE PREVIEW + DESCARGA DIRECTA ─────────────────────────────────────────
async function buildShareCanvas(n) {
  const preview = document.getElementById('share-preview');
  const loading = document.getElementById('canvas-loading');
  loading.style.display = 'flex';
  preview.src = n.image || '';
  preview.onload  = () => { loading.style.display = 'none'; };
  preview.onerror = () => { loading.style.display = 'none'; };
  if (!n.image) loading.style.display = 'none';
}

async function downloadOriginalImage(n) {
  if (!n || !n.image) return;
  const resp = await fetch(n.image);
  const blob = await resp.blob();
  const ext  = (n.image.split('.').pop() || 'png').toLowerCase();
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `top-secret-fc-${n.id}.${ext}`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

// ── SHARE ACTIONS ────────────────────────────────────────────────────────────
function getCaption() {
  return document.getElementById('share-caption').value;
}

function platformCaption(key) {
  if (!_shareNews) return '';
  const base = (_shareNews.shareCaptions || {})[key] || _shareNews.shareCaption || '';
  const url = BASE_URL + '#' + _shareNews.id;
  return base + '\n\n🔗 ' + url;
}

function copyAndFlash(btn, text, label) {
  navigator.clipboard.writeText(text).catch(() => {});
  document.getElementById('share-caption').value = text;
  const orig = btn.innerHTML;
  btn.innerHTML = orig.replace(label, '✓ Copiado');
  setTimeout(() => { btn.innerHTML = orig; }, 2000);
}

async function shareIG() {
  const btn = event.currentTarget;
  copyAndFlash(btn, platformCaption('ig'), 'Instagram');
  await downloadOriginalImage(_shareNews);
}

async function shareX() {
  const btn = event.currentTarget;
  const cap = platformCaption('x');
  copyAndFlash(btn, cap, 'X / Twitter');
  await downloadOriginalImage(_shareNews);
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(cap), '_blank');
}

async function shareFB() {
  const btn = event.currentTarget;
  copyAndFlash(btn, platformCaption('fb'), 'Facebook · imagen descargada');
  await downloadOriginalImage(_shareNews);
  window.open('https://www.facebook.com/', '_blank');
}

async function shareAll() {
  await webShareAction();
}

function downloadImg() {
  downloadOriginalImage(_shareNews);
}

async function webShareAction() {
  if (!_shareNews || !_shareNews.image) return;
  try {
    const resp = await fetch(_shareNews.image);
    const blob = await resp.blob();
    const ext  = (_shareNews.image.split('.').pop() || 'png').toLowerCase();
    const file = new File([blob], `top-secret-fc.${ext}`, { type: blob.type });
    await navigator.share({ title: _shareNews.title, text: getCaption(), files: [file] });
  } catch(e) {
    if (e.name !== 'AbortError') await downloadOriginalImage(_shareNews);
  }
}

function copyCaption() {
  const txt = getCaption();
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.currentTarget;
    const orig = btn.innerHTML;
    btn.innerHTML = btn.innerHTML.replace('Copiar texto', '¡Copiado!');
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

function copyOgLink() {
  if (!_shareNews) return;
  const btn = event.currentTarget;
  const ogUrl = 'https://top-secret-proxy.juan-c-m-1985.workers.dev/og/' + _shareNews.id;
  navigator.clipboard.writeText(ogUrl).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = btn.innerHTML.replace('Copiar link', '¡Copiado!');
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

// ── CLOSE ON BACKDROP ────────────────────────────────────────────────────────
document.getElementById('article-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeArticle();
});
document.getElementById('share-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeShare();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
init();
const _initHash = location.hash.slice(1);
if (_initHash && findNews(_initHash)) openArticle(_initHash);
</script>

<script type="module">
import { generateMatchNews } from './auto-noticias.js';
import { SEED_MATCHES } from './seed_matches.js';
window._AUTO_NEWS = generateMatchNews(SEED_MATCHES);
renderAutoSection(window._AUTO_NEWS);
const _h = location.hash.slice(1);
if (_h && !document.getElementById('article-overlay').classList.contains('open') && findNews(_h)) openArticle(_h);
</script>
