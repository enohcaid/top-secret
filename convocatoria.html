<!DOCTYPE html>
<!-- v2024-04-09-03 -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Top Secret FC · Convocatoria</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--card:#0f1117;--card2:#13161e;--border:#1c2030;--border2:#252a38;
  --text:#dde1ec;--muted:#525974;--muted2:#8b92aa;
  --green:#3ecf8e;--yellow:#f5c518;--red:#e8502e;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding:32px 16px 64px;}

/* ─── HEADER ─── */
.masthead{text-align:center;margin-bottom:24px;position:relative;}
.masthead::before{content:'';position:absolute;top:-28px;left:50%;transform:translateX(-50%);width:400px;height:180px;background:radial-gradient(ellipse,rgba(245,197,24,.06) 0%,transparent 70%);pointer-events:none;}
.club-logo{width:70px;height:70px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(245,197,24,.25));margin-bottom:4px;}
.club-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.2rem,6vw,3.8rem);font-weight:900;letter-spacing:.05em;line-height:1;color:#fff;}
.club-name span{color:var(--yellow);}
.season-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border2);padding:3px 12px;border-radius:20px;margin-top:6px;}

/* ─── STATS BAR ─── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.stat span{display:block;font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;line-height:1;}
.stat small{display:block;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-top:4px;}
.s-green span{color:var(--green);} .s-yellow span{color:var(--yellow);} .s-red span{color:var(--red);} .s-muted span{color:var(--muted2);}

/* ─── SECTION HEAD ─── */
.section-head{display:flex;align-items:center;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;}

/* ─── MAIN LAYOUT ─── */
.main-layout{display:flex;flex-direction:row;gap:20px;align-items:flex-start;width:100%;max-width:1200px;margin:0 auto;}
@media(max-width:720px){.main-layout{flex-direction:column;}}
.left-col{flex:1 1 0;min-width:0;}
.right-col{flex:1 1 0;min-width:0;position:sticky;top:20px;}

/* ─── PLAYER LIST ─── */
.pos-label{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:12px 0 5px 2px;}
.pcard{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-left:3px solid var(--border2);
  border-radius:9px;padding:9px 12px;margin-bottom:4px;
  cursor:grab;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.pcard:hover,.pcard:active{background:var(--card2);}
.pcard.green{border-left-color:var(--green);}
.pcard.yellow{border-left-color:var(--yellow);}
.pcard.red{border-left-color:var(--red);opacity:.55;}
.pcard.black{border-left-color:#3a3f52;opacity:.45;}
.pcard.green .pnum{color:var(--green);}
.pcard.yellow .pnum{color:var(--yellow);}
.pcard.red .pnum{color:var(--red);}
.pnum{font-family:'Barlow Condensed',sans-serif;font-size:1.55rem;font-weight:800;line-height:1;color:var(--muted2);min-width:30px;text-align:center;flex-shrink:0;}
.pavatar{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.85rem;color:#000;}
.pavatar{position:relative;}
.pavatar img{width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:50%;}
.pavatar img.svg-crop{position:absolute;width:195.8px;height:110.2px;left:0;top:0;border-radius:0;object-fit:none;transform:scale(0.214);transform-origin:top left;}
.pavatar[data-player="Woolfyboyzx2"] img.svg-crop{left:-21.4px;top:-4.5px;}
.pavatar[data-player="Zurdo-_CABJ12"] img.svg-crop{left:-20.9px;top:-4.5px;}
.pavatar[data-player="Alexiisraiies23"] img.svg-crop{left:-20.1px;top:-4.5px;}
.pavatar[data-player="Agubostero7"] img.svg-crop{left:-19.7px;top:-4.8px;}
.pavatar[data-player="zPibu__"] img.svg-crop{left:-20.8px;top:-4.5px;}
.pavatar[data-player="Juan_Martinez4"] img.svg-crop{left:-15.1px;top:-2.5px;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.psub{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap;}
.ppos{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);}
.pnote{font-size:.68rem;font-weight:700;color:var(--yellow);}
.always-badge{font-size:.58rem;background:rgba(62,207,142,.15);color:#1f8c4e;border-radius:4px;padding:1px 5px;font-weight:700;}
.sdot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.sdot.sg{background:#1a7a40;box-shadow:0 0 0 2px rgba(26,122,64,.3);}
.sdot.sy{background:#b8900a;box-shadow:0 0 0 2px rgba(184,144,10,.3);}
.sdot.sr{background:#b03018;box-shadow:0 0 0 2px rgba(176,48,24,.25);}
.sdot.sb{background:#2a2f3f;border:1px solid #444;}
.sdot.sp{background:transparent;border:1.5px solid rgba(255,255,255,.2);}

/* ─── FORMATION BAR ─── */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.fbtn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;}
.fbtn.active{background:var(--yellow);border-color:var(--yellow);color:#000;}
.fbtn:hover:not(.active){border-color:var(--muted2);color:var(--text);}

/* ─── PITCH ─── */
.pitch{
  position:relative;width:100%;
  aspect-ratio:3/4;
  background:repeating-linear-gradient(180deg,#1b5030 0,#1b5030 28px,#1e5835 28px,#1e5835 56px);
  border-radius:10px;border:2px solid rgba(255,255,255,.12);overflow:hidden;
}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;z-index:2;-webkit-tap-highlight-color:transparent;}
.stoken{
  width:clamp(54px,5.5vw,80px);height:clamp(54px,5.5vw,80px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.15rem;
  border:2px solid rgba(255,255,255,.4);
  box-shadow:0 2px 10px rgba(0,0,0,.6);
  transition:transform .14s,box-shadow .14s;
  position:relative;overflow:hidden;
}
.stoken.empty{background:rgba(255,255,255,.08);border:2px dashed rgba(255,255,255,.25);color:rgba(255,255,255,.38);font-size:clamp(.5rem,.6vw,.72rem);letter-spacing:.04em;}
.stoken.filled{border-color:rgba(255,255,255,.65);}
.slot:hover .stoken{transform:scale(1.1);}
.stoken.drag-over{box-shadow:0 0 0 3px var(--yellow);transform:scale(1.1);}
.stoken img{width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:50%;}
.stoken img.svg-crop{position:absolute;width:195.8px;height:110.2px;left:0;top:0;border-radius:0;object-fit:none;transform:scale(0.5);transform-origin:top left;}
.stoken[data-player="Woolfyboyzx2"] img.svg-crop{left:-50px;top:-10.5px;}
.stoken[data-player="Zurdo-_CABJ12"] img.svg-crop{left:-48.95px;top:-10.5px;}
.stoken[data-player="Alexiisraiies23"] img.svg-crop{left:-47px;top:-10.5px;}
.stoken[data-player="Agubostero7"] img.svg-crop{left:-46px;top:-11.15px;}
.stoken[data-player="zPibu__"] img.svg-crop{left:-48.7px;top:-10.5px;}
.stoken[data-player="Juan_Martinez4"] img.svg-crop{left:-35.35px;top:-5.8px;}
.snum{position:absolute;bottom:0;left:0;right:0;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:clamp(.65rem,.82vw,.95rem);font-weight:900;line-height:1.6;background:rgba(0,0,0,.65);color:#fff;}
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;color:rgba(255,255,255,.9);white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,1),0 0 8px rgba(0,0,0,.9);max-width:72px;overflow:hidden;text-overflow:ellipsis;text-align:center;letter-spacing:.01em;}
.pitch-hint{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:8px;opacity:.6;}

/* ─── TOOLBAR ─── */
.published-badge{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);padding:3px 10px;border-radius:20px;}
.pill-btn{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;transition:all .15s;}
.pill-btn:hover{background:var(--green);color:#000;}
.pill-btn.depub{border-color:var(--muted2);color:var(--muted2);}
.pill-btn.depub:hover{background:var(--muted2);color:#000;}

/* ─── MODALS ─── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:480px){.overlay{align-items:center;padding:20px;}}
.overlay.open{display:flex;}
.modal{background:#13161e;border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:22px 18px 30px;width:100%;max-width:400px;}
@media(min-width:480px){.modal{border-radius:14px;}}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:12px;}
.mph{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.mph-av{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#000;font-size:.9rem;}
.mph-av img{width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:50%;}
.mph-name{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);}
.mph-sub{font-size:.7rem;color:var(--muted2);margin-top:2px;}
.sopts{display:flex;flex-direction:column;gap:7px;}
.sopt{width:100%;padding:11px 13px;text-align:left;font-family:'Barlow',sans-serif;font-size:.86rem;font-weight:600;background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:9px;cursor:pointer;transition:all .14s;}
.sopt:hover,.sopt:active{border-color:var(--muted2);background:var(--card2);}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.9rem;padding:10px 12px;outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:var(--muted2);}
.mbtns{display:flex;gap:8px;margin-top:4px;}
.mbtn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;flex:1;transition:all .15s;}
.mbtn-cancel{background:transparent;color:var(--muted2);}
.mbtn-save{background:var(--yellow);border-color:var(--yellow);color:#000;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);padding:10px 22px;border-radius:10px;font-family:'Barlow',sans-serif;font-size:.86rem;font-weight:600;opacity:0;transition:all .28s;z-index:9999;pointer-events:none;white-space:nowrap;background:#1a2e20;color:var(--green);border:1px solid var(--green);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.info{background:#141820;color:var(--muted2);border-color:var(--border2);}

.stoken.selected{box-shadow:0 0 0 3px var(--yellow),0 0 16px rgba(245,197,24,.4);transform:scale(1.12);}
.pitch-hint.selecting{color:var(--yellow);opacity:1;}
.pcard.assignable{border-left-color:var(--yellow);cursor:pointer;}
.pcard.assignable:hover{background:rgba(245,197,24,.08);}
.assign-banner{
  display:none;
  background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.35);
  border-radius:8px;padding:8px 14px;margin-bottom:10px;
  font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;
  letter-spacing:.06em;color:var(--yellow);
  display:flex;align-items:center;justify-content:space-between;
}
.assign-banner.hidden{display:none!important;}
.assign-cancel{font-size:.7rem;opacity:.7;cursor:pointer;padding:2px 8px;border:1px solid currentColor;border-radius:4px;}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="masthead" style="max-width:1200px;margin-left:auto;margin-right:auto;">
  <img src="Top-Secret.png" class="club-logo" alt="Top Secret FC">
  <div class="club-name">TOP <span>SECRET</span></div>
  <div class="season-tag" id="dateTag">Cargando...</div>
</div>

<!-- STATS -->
<div class="stats-bar" style="max-width:1200px;margin-left:auto;margin-right:auto;">
  <div class="stat s-green"><span id="sG">0</span><small>Presentes</small></div>
  <div class="stat s-yellow"><span id="sY">0</span><small>Tarde</small></div>
  <div class="stat s-red"><span id="sR">0</span><small>Ausentes</small></div>
  <div class="stat s-muted"><span id="sP">0</span><small>Sin confirmar</small></div>
</div>

<!-- SECTION HEADERS ROW -->
<div style="display:flex;gap:20px;margin-bottom:0;max-width:1200px;margin-left:auto;margin-right:auto;">
  <div style="flex:1 1 0;" class="section-head">
    <span>Disponibilidad</span>
    <span id="sectionDate" style="font-size:.65rem;letter-spacing:.1em;font-weight:600"></span>

  <div style="flex:1 1 0;" class="section-head">

    <div style="display:flex;gap:8px;align-items:center">
<button class="pill-btn" id="publishBtn" onclick="window.togglePublish()">📸 Compartir</button>

</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- RIGHT: PITCH -->
  <div class="right-col">
    <div id="assignBanner" style="display:none;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.35);border-radius:8px;padding:8px 14px;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.06em;color:var(--yellow);align-items:center;justify-content:space-between;gap:10px;">
      <span id="assignBannerText">Seleccioná un jugador</span>
      <span onclick="window.cancelSlotSelect()" style="font-size:.7rem;opacity:.7;cursor:pointer;padding:2px 8px;border:1px solid currentColor;border-radius:4px;">✕</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
    <div class="fbar" id="fbar" style="margin-bottom:0;"></div>
    <button class="fbtn" id="autoBtn" onclick="autoLineup()" style="background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.4);color:var(--yellow);letter-spacing:.05em;">⚡ Auto</button>

        <rect x="72" y="10" width="156" height="56" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="1.5"/>
        <rect x="112" y="10" width="76" height="22" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <circle cx="150" cy="47" r="2.5" fill="rgba(255,255,255,.3)"/>
        <rect x="72" y="334" width="156" height="56" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="1.5"/>
        <rect x="112" y="368" width="76" height="22" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <circle cx="150" cy="353" r="2.5" fill="rgba(255,255,255,.3)"/>
        <rect x="127" y="3" width="46" height="9" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="1.5"/>
        <rect x="127" y="388" width="46" height="9" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="1.5"/>
        <path d="M110,66 A34,34 0 0,0 190,66" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
        <path d="M110,334 A34,34 0 0,1 190,334" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
      </svg>
    </div>
    <div class="pitch-hint">Arrastrá un jugador al puesto</div>
  </div>
</div>

<!-- STATUS MODAL -->
<div class="overlay" id="statusOverlay" onclick="if(event.target===this)closeModal('statusOverlay')">
  <div class="modal">
    <div class="mph" id="mph"></div>
    <div class="sopts">
      <button class="sopt" onclick="confirmStatus('green')">🟢 Presente hoy</button>
      <button class="sopt" onclick="confirmStatus('green_always')">🌿 Siempre presente <span style="font-size:.72rem;color:var(--muted2);font-weight:400">(todos los días)</span></button>
      <button class="sopt" onclick="confirmStatus('yellow')">🟡 Llego tarde…</button>
      <button class="sopt" onclick="confirmStatus('red')">🔴 Ausente hoy</button>
      <button class="sopt" onclick="confirmStatus('black')">⚫ Ausente varios días…</button>
    </div>
    <button class="mbtn mbtn-cancel" onclick="closeModal('statusOverlay')" style="width:100%;margin-top:10px">Cancelar</button>
  </div>
</div>

<!-- LATE MODAL -->
<div class="overlay" id="lateOverlay" onclick="if(event.target===this)closeModal('lateOverlay')">
  <div class="modal">
    <h3>🟡 ¿A qué hora llegás?</h3>
    <p style="font-size:.76rem;color:var(--muted2);margin-bottom:12px">Indicá la hora estimada.</p>
    <input type="time" id="lateTimeInput" class="modal-input">
    <div class="mbtns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('lateOverlay')">Cancelar</button>
      <button class="mbtn mbtn-save" onclick="saveLateTime()">Confirmar</button>
    </div>
  </div>
</div>

<!-- BLACK MODAL -->
<div class="overlay" id="blackOverlay" onclick="if(event.target===this)closeModal('blackOverlay')">
  <div class="modal">
    <h3>⚫ ¿Hasta cuándo?</h3>
    <p style="font-size:.76rem;color:var(--muted2);margin-bottom:12px">Se marcará ausente todos los días hasta esta fecha.</p>
    <input type="date" id="blackDateInput" class="modal-input">
    <div class="mbtns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('blackOverlay')">Cancelar</button>
      <button class="mbtn mbtn-save" onclick="saveBlackDate()">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

let calEdits = {};
let calSuspended = {};
getDoc(CAL_DOC).then(s => {
  if (s.exists()) {
    const d = s.data();
    calEdits     = d.edits     || {};
    calSuspended = d.suspended || {};
  }
}).catch(() => {});

function getTodayMatches() {
  return CAL_RAW.map((m, i) => {
    const base = Object.assign({}, m);
    if (calEdits[i])     Object.assign(base, calEdits[i]);
    if (calSuspended[i]) base.date = calSuspended[i].newDate;
    return base;
  }).filter(m => m.date === TODAY && !m.free);
}

function buildWhatsAppMessage() {
  const todayMatches = getTodayMatches();
  const D = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const M = ['Enero','Feb','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sep','Oct','Nov','Dic'];
  const dt = new Date(TODAY + 'T12:00:00');
  const dayStr = D[dt.getDay()] + ' ' + dt.getDate() + ' de ' + M[dt.getMonth()];

  let msg = '⚽ *TOP SECRET FC*\n';
  msg += '📅 ' + dayStr + '\n';
  msg += '─────────────────\n';
  msg += '*22:30hs ADENTRO* 🔥\n\n';

  if (todayMatches.length === 0) {
    msg += '_Sin partidos hoy_\n';
  } else {
    // Sort by time
    todayMatches.sort((a, b) => a.time.localeCompare(b.time));
    const leagueEmoji = { 'VPN': '🟡', 'VPUG': '🟢', '11x11': '🔴' };
    todayMatches.forEach(m => {
      const emoji = leagueEmoji[m.league] || '⚪';
      const cond  = m.isHome ? '🏠 Local' : '✈️ Visita';
      msg += emoji + ' *' + m.time + 'hs* · ' + m.league + '\n';
      msg += '   vs *' + m.rival + '* — ' + cond + '\n\n';
    });
  }

  return msg;
}

    {key:'RM', l:'LD', x:85,y:37},{key:'CM1',l:'MCD',x:57,y:44},{key:'CM2',l:'MCI',x:43,y:34},{key:'LM',l:'LI', x:15,y:37},
    {key:'RW', l:'ED', x:80,y:14},{key:'CF', l:'DC', x:50,y:14},{key:'LW',l:'EI', x:20,y:14},

};

// ── STATE ──────────────────────────────────────────────────────────────────────
let availability  = {};
let alwaysPresent = [];
let lineup        = { formation:'4-3-3', slots:{} };
let published     = false;
let currentPlayer = null;
let selectedSlotKey = null;
let _saving       = false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getStatus(name) {
  const rec = availability[name];
  if (!rec) return alwaysPresent.includes(name) ? 'green' : 'pending';
  if (rec.status === 'black' && rec.returnDate && rec.returnDate <= TODAY) return 'green';
  return rec.status;
}
function getInitials(name) { return name.split(/[_\s]+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function getPosColor(pos) {
  if (pos==='POR') return '#f5c518';
  if (['DCD','DFC','DFD','DCI'].includes(pos)) return '#4a9eff';
  if (['LD','LI','DFI'].includes(pos)) return '#7ec8f5';
  if (['MCD','MCI','MVD','MVI'].includes(pos)) return '#3ecf8e';
  return '#e8502e';
}
function getPosLabel(pos) {
  if (pos==='POR') return 'POR';
  if (['DCD','DFC','DFD','DCI'].includes(pos)) return 'DEF';
  if (['LD','LI','DFI'].includes(pos)) return 'LAT';
  if (['MCD','MCI','MVD','MVI'].includes(pos)) return 'MED';
  return 'DEL';
}
function fmtDate(d) {
  const dt = new Date(d+'T12:00:00');
  const D=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const M=['Enero','Feb','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sep','Oct','Nov','Dic'];
  return D[dt.getDay()]+' '+dt.getDate()+' de '+M[dt.getMonth()];
}
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2500);
}
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };

// ── FIREBASE ──────────────────────────────────────────────────────────────────
getDoc(META_DOC).then(s=>{
  if(s.exists()){alwaysPresent=s.data().alwaysPresent||[];}
  render();
}).catch(()=>render());

onSnapshot(DAY_DOC, snap=>{
  if(_saving) return;
  if(snap.exists()){
    const d=snap.data();
    availability=d.availability||{};
    lineup=d.lineup||{formation:'4-3-3',slots:{}};
    published=d.published||false;
  } else {
    availability={}; lineup={formation:'4-3-3',slots:{}}; published=false;
  }
  render();
});

async function saveDay() {
  _saving=true;
  try { await setDoc(DAY_DOC,{availability,lineup,published},{merge:true}); }
  catch(e){ console.warn(e); }
  finally { setTimeout(()=>{_saving=false;},1500); }
}
async function saveMeta() {
  try { await setDoc(META_DOC,{alwaysPresent}); }
  catch(e){ console.warn(e); }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const dTag=document.getElementById('dateTag');
  const sDate=document.getElementById('sectionDate');
  if(dTag) dTag.textContent=fmtDate(TODAY);
  if(sDate) sDate.textContent=fmtDate(TODAY);
  renderList();
  renderStats();
  renderFbar();
  renderPitch();
  // published view
  const pb=document.getElementById('publishedBadge');
  const btn=document.getElementById('publishBtn');
  // publish badge not used
}

function renderList() {
  const el=document.getElementById('playersList');
  if(!el) return;
  el.innerHTML='';
  const dotCls={green:'sg',yellow:'sy',red:'sr',black:'sb',pending:'sp'};
  const onPitch=new Set(Object.values(lineup.slots));
  const groups=[
    {label:'Arquero',     f:p=>p.pos==='POR'},
    {label:'Defensores',  f:p=>['DCD','DFC','DFD','DCI'].includes(p.pos)},
    {label:'Laterales',   f:p=>['LD','LI','DFI'].includes(p.pos)},
    {label:'Mediocampistas',f:p=>['MCD','MCI','MVD','MVI'].includes(p.pos)},
    {label:'Delanteros',  f:p=>['DC','EI','ED'].includes(p.pos)},
  ];
  let delay=0;
  groups.forEach(g=>{
    const gp=PLAYERS.filter(g.f);
    if(!gp.length) return;
    const lbl=document.createElement('div');
    lbl.className='pos-label'; lbl.textContent=g.label;
    el.appendChild(lbl);
    gp.forEach(p=>{
      const st=getStatus(p.name);
      const note=availability[p.name]?.note||'';
      const always=alwaysPresent.includes(p.name);
      const pitched=onPitch.has(p.name);
      const card=document.createElement('div');
      card.className='pcard '+st;
      card.style.animationDelay=delay*0.03+'s';
      card.draggable=true;
      card.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('playerName',p.name);
        e.dataTransfer.effectAllowed='move';
        setTimeout(()=>card.style.opacity='.4',0);
      });
      card.addEventListener('dragend',()=>card.style.opacity='');
      card.addEventListener('click',()=>{
        if(selectedSlotKey){
          assignPlayerToSelectedSlot(p.name);
        } else {
          openStatusModal(p.name);
        }
      });
      if(selectedSlotKey) card.classList.add('assignable');
      // Number
      const pnum=document.createElement('div');
      pnum.className='pnum'; pnum.textContent=p.num;
      // Avatar
      const av=document.createElement('div');
      av.className='pavatar';
      av.setAttribute('data-player',p.name);
      if(p.photo){
        av.textContent='';
        av.style.background='transparent';
        const img=document.createElement('img');
        img.src=p.photo;
        img.alt=p.name;
        img.style.cssText='width:100%;height:100%;object-fit:cover;';
        av.appendChild(img);
      } else if(p.img){
        av.textContent='';
        av.style.background='transparent';
        const img=document.createElement('img');
        img.src=p.img;
        img.alt=p.name;
        img.style.cssText='width:100%;height:100%;object-fit:cover;';
        av.appendChild(img);
      } else { 
        av.style.background=getPosColor(p.pos);
        av.textContent=getInitials(p.name); 
      }
      // Info
      const info=document.createElement('div'); info.className='pinfo';
      const nm=document.createElement('div'); nm.className='pname';
      nm.textContent=p.name+(always?' ':'');
      if(always){const ab=document.createElement('span');ab.className='always-badge';ab.textContent='∞';nm.appendChild(ab);}
      const sub=document.createElement('div'); sub.className='psub';
      const pos=document.createElement('span'); pos.className='ppos'; pos.textContent=getPosLabel(p.pos);
      sub.appendChild(pos);
      if(pitched){const sp=document.createElement('span');sp.style.cssText='font-size:.58rem;color:#1f8c4e;font-weight:700;letter-spacing:.04em;';sp.textContent='✓ EN CANCHA';sub.appendChild(sp);}
      info.appendChild(nm); info.appendChild(sub);
      if(note){const nt=document.createElement('div');nt.className='pnote';nt.style.marginTop='3px';nt.textContent=note;info.appendChild(nt);}
      // Dot
      const dot=document.createElement('span'); dot.className='sdot '+(dotCls[st]||'sp');
      card.appendChild(pnum); card.appendChild(av); card.appendChild(info); card.appendChild(dot);
      el.appendChild(card);
      delay++;
    });
  });
}

function renderStats() {
  let g=0,y=0,r=0,p=0;
  PLAYERS.forEach(pl=>{
    const s=getStatus(pl.name);
    if(s==='green')g++; else if(s==='yellow')y++; else if(s==='red'||s==='black')r++; else p++;
  });
  document.getElementById('sG').textContent=g;
  document.getElementById('sY').textContent=y;
  document.getElementById('sR').textContent=r;
  document.getElementById('sP').textContent=p;
}

function renderFbar() {
  const bar=document.getElementById('fbar'); if(!bar) return;
  bar.innerHTML='';
  Object.keys(FORMATIONS).forEach(f=>{
    const btn=document.createElement('button');
    btn.className='fbtn'+(f===lineup.formation?' active':'');
    btn.textContent=f;
    btn.onclick=()=>selectFormation(f);
    bar.appendChild(btn);
  });
}

function renderPitch() {
  const pitch=document.getElementById('pitch'); if(!pitch) return;
  pitch.querySelectorAll('.slot').forEach(el=>el.remove());
  const slots=FORMATIONS[lineup.formation]||FORMATIONS['4-3-3'];
  slots.forEach(s=>{
    const assigned=lineup.slots[s.key];
    const player=assigned?PLAYERS.find(p=>p.name===assigned):null;
    const el=document.createElement('div'); el.className='slot';
    el.style.left=s.x+'%'; el.style.top=s.y+'%';
    const tok=document.createElement('div');
    const lbl=document.createElement('div'); lbl.className='slabel';
    if(player){
      tok.className='stoken filled';
      if(player.photo){
        tok.textContent='';
        tok.style.background='transparent';
        const img=document.createElement('img');
        img.src=player.photo;
        img.alt=player.name;
        img.style.cssText='width:100%;height:100%;object-fit:cover;';
        tok.appendChild(img);
        const num=document.createElement('div'); num.className='snum'; num.textContent=player.num;
        tok.appendChild(num);
      } else if(player.img){
        tok.textContent='';
        tok.style.background='transparent';
        const img=document.createElement('img');
        img.src=player.img;
        img.alt=player.name;
        img.style.cssText='width:100%;height:100%;object-fit:cover;';
        tok.appendChild(img);
        const num=document.createElement('div'); num.className='snum'; num.textContent=player.num;
        tok.appendChild(num);
      } else { 
        tok.style.background=getPosColor(player.pos);
        tok.style.color='#000'; tok.textContent=player.num; 
      }
      lbl.textContent=player.name;
    } else {
      tok.className='stoken empty'; tok.textContent=s.l;
      lbl.textContent=s.l; lbl.style.color='rgba(255,255,255,.2)';
    }
    el.appendChild(tok); el.appendChild(lbl);
    el.addEventListener('click',()=>handleSlotClick(s.key));
    if(s.key===selectedSlotKey) tok.classList.add('selected');
    el.addEventListener('dragover',e=>{e.preventDefault();tok.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>tok.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault(); tok.classList.remove('drag-over');
      const pName=e.dataTransfer.getData('playerName');
      if(pName) dropOnSlot(s.key,pName);
    });
    pitch.appendChild(el);
  });
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function selectFormation(f){
  if(f===lineup.formation) return;
  lineup={formation:f,slots:{}};
  saveDay(); render();
}
function handleSlotClick(key) {
  if (selectedSlotKey) {
    if (selectedSlotKey === key) {
      // Tap same slot again → remove player
      delete lineup.slots[key];
      cancelSlotSelect(); saveDay(); render();
    } else {
      // Swap or assign
      const player = lineup.slots[selectedSlotKey];
      const existing = lineup.slots[key];
      if (player) { lineup.slots[key] = player; delete lineup.slots[selectedSlotKey]; }
      if (existing) lineup.slots[selectedSlotKey] = existing;
      cancelSlotSelect(); saveDay(); render();
    }
  } else if (lineup.slots[key]) {
    // Filled slot: select it (tap again to remove, or pick another slot/player)
    selectSlot(key);
    showToast('Tocá otro puesto para mover, o tocá este de nuevo para quitar', 'info');
  } else {
    // Empty slot: select it
    selectSlot(key);
  }
}
function dropOnSlot(key,name){
  Object.keys(lineup.slots).forEach(k=>{ if(lineup.slots[k]===name) delete lineup.slots[k]; });
  lineup.slots[key]=name;
  saveDay(); render();
}

// ── STATUS MODAL ──────────────────────────────────────────────────────────────
function openStatusModal(name){
  currentPlayer=name;
  const p=PLAYERS.find(pl=>pl.name===name);
  const mph=document.getElementById('mph'); mph.innerHTML='';
  const av=document.createElement('div'); av.className='mph-av'; av.style.background=getPosColor(p.pos);
  if(p.img){const img=document.createElement('img');img.src=p.img;img.alt=p.name;av.appendChild(img);}
  else{av.textContent=getInitials(p.name);}
  const txt=document.createElement('div');
  const nm=document.createElement('div'); nm.className='mph-name'; nm.textContent=p.name;
  const sub=document.createElement('div'); sub.className='mph-sub'; sub.textContent=getPosLabel(p.pos)+' · #'+p.num+' · '+({'green':'🟢','yellow':'🟡','red':'🔴','black':'⚫','pending':'⬜'}[getStatus(p.name)]||'⬜');
  const note=availability[p.name]?.note||'';
  if(note){const nd=document.createElement('div');nd.style.cssText='font-size:.7rem;color:var(--yellow);font-weight:600;margin-top:2px;';nd.textContent=note;txt.appendChild(nm);txt.appendChild(sub);txt.appendChild(nd);}
  else{txt.appendChild(nm);txt.appendChild(sub);}
  mph.appendChild(av); mph.appendChild(txt);
  document.getElementById('statusOverlay').classList.add('open');
}
window.confirmStatus = function(status){
  const name=currentPlayer;
  closeModal('statusOverlay');
  if(status==='yellow'){document.getElementById('lateOverlay').classList.add('open');return;}
  if(status==='black') {document.getElementById('blackOverlay').classList.add('open');return;}
  let realStatus=status;
  if(status==='green_always'){
    if(!alwaysPresent.includes(name)) alwaysPresent.push(name);
    realStatus='green'; saveMeta();
  } else {
    alwaysPresent=alwaysPresent.filter(n=>n!==name); saveMeta();
  }
  availability[name]={status:realStatus}; // clears any old note
  render();
  showToast(name+' → '+(realStatus==='green'?'Presente':'Ausente'));
  saveDay();
};
window.saveLateTime = function(){
  const time=document.getElementById('lateTimeInput').value; if(!time) return;
  alwaysPresent=alwaysPresent.filter(n=>n!==currentPlayer); saveMeta();
  availability[currentPlayer]={status:'yellow',note:'Llega ~'+time};
  closeModal('lateOverlay'); render();
  showToast(currentPlayer+' → Tarde (~'+time+')');
  saveDay();
};
window.saveBlackDate = function(){
  const date=document.getElementById('blackDateInput').value; if(!date) return;
  alwaysPresent=alwaysPresent.filter(n=>n!==currentPlayer); saveMeta();
  const d=new Date(date+'T12:00:00');
  const fmt=d.getDate()+'/'+(d.getMonth()+1);
  availability[currentPlayer]={status:'black',returnDate:date,note:'Vuelve '+fmt};
  closeModal('blackOverlay'); render();
  showToast(currentPlayer+' → Ausente hasta '+fmt);
  saveDay();
};
window.togglePublish = async function(){
  const btn  = document.getElementById('publishBtn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Generando...';
  btn.disabled = true;

  const pitchEl = document.getElementById('pitch');
  const S = 3;
  const FW = pitchEl.offsetWidth  * S;
  const FH = pitchEl.offsetHeight * S;
  const FOOTER = Math.round(FH * 0.13);
  const TH = FH + FOOTER; // total canvas height

  const cvs = document.createElement('canvas');
  cvs.width  = FW;
  cvs.height = TH;
  const ctx  = cvs.getContext('2d');

  // ── 1. Draw green stripes (full field area) ─────────────────────────────
  const stripeH = 28 * S;
  for (let y = 0; y < FH; y += stripeH * 2) {
    ctx.fillStyle = '#1b5030'; ctx.fillRect(0, y, FW, stripeH);
    ctx.fillStyle = '#1e5835'; ctx.fillRect(0, y + stripeH, FW, stripeH);
  }

  // ── 2. Draw pitch lines ──────────────────────────────────────────────────
  const vsx = FW / 300, vsy = FH / 400;
  function pline(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1*vsx,y1*vsy); ctx.lineTo(x2*vsx,y2*vsy); ctx.stroke(); }
  function prect(x,y,w,h){ ctx.strokeRect(x*vsx,y*vsy,w*vsx,h*vsy); }
  function parc(cx,cy,r,a1,a2){ ctx.beginPath(); ctx.arc(cx*vsx,cy*vsy,r*vsx,a1,a2); ctx.stroke(); }
  function pdot(cx,cy,r,fill){ ctx.beginPath(); ctx.arc(cx*vsx,cy*vsy,r*vsx,0,Math.PI*2); ctx.fillStyle=fill; ctx.fill(); }

  ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=1.5*S;
  prect(10,10,280,380); pline(10,200,290,200);
  parc(150,200,34,0,Math.PI*2);
  pdot(150,200,2.5,'rgba(255,255,255,.3)');
  prect(72,10,156,56); prect(112,10,76,22);
  pdot(150,47,2.5,'rgba(255,255,255,.3)');
  prect(72,334,156,56); prect(112,368,76,22);
  pdot(150,353,2.5,'rgba(255,255,255,.3)');
  ctx.strokeStyle='rgba(255,255,255,.22)';
  prect(127,3,46,9); prect(127,388,46,9);
  ctx.strokeStyle='rgba(255,255,255,.12)';
  parc(150,66,34,0,Math.PI); parc(150,334,34,Math.PI,0);

  // ── 3. Draw players ──────────────────────────────────────────────────────
  const posColors = {
    POR:'#f5c518',DCD:'#4a9eff',DFC:'#4a9eff',DFD:'#4a9eff',DCI:'#4a9eff',
    LD:'#7ec8f5',LI:'#7ec8f5',DFI:'#7ec8f5',
    MCD:'#3ecf8e',MCI:'#3ecf8e',MVD:'#3ecf8e',MVI:'#3ecf8e',
    DC:'#e8502e',EI:'#e8502e',ED:'#e8502e',
  };
  const tokenR = 48 * S;
  const slots  = FORMATIONS[lineup.formation] || FORMATIONS['4-3-3'];

  await Promise.all(slots.map(s => new Promise(resolve => {
    const assigned = lineup.slots[s.key];
    const player   = assigned ? PLAYERS.find(p => p.name === assigned) : null;
    const cx = (s.x / 100) * FW;
    const cy = (s.y / 100) * FH;

    if (player) {
      const color = posColors[player.pos] || '#888';
      // Draw filled circle
      ctx.beginPath(); ctx.arc(cx, cy, tokenR, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.65)'; ctx.lineWidth = 2*S; ctx.stroke();

      if (player.img) {
        const img = new Image();
        img.onload = () => {
          // Cover-crop photo
          ctx.save();
          ctx.beginPath(); ctx.arc(cx, cy, tokenR-S, 0, Math.PI*2); ctx.clip();
          const iw=img.naturalWidth, ih=img.naturalHeight;
          const d=tokenR*2, scale=d/Math.min(iw,ih);
          const sw=d/scale, sh=d/scale;
          ctx.drawImage(img, Math.max(0,(iw-sw)/2), 0, sw, sh, cx-tokenR, cy-tokenR, d, d);
          ctx.restore();
          // Number badge bottom-right
          const br=tokenR*0.42, bx=cx+tokenR*0.6, by=cy+tokenR*0.6;
          ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2);
          ctx.fillStyle='rgba(0,0,0,.85)'; ctx.fill();
          ctx.strokeStyle='#fff'; ctx.lineWidth=1.5*S; ctx.stroke();
          ctx.fillStyle='#fff';
          ctx.font='bold '+(20*S)+'px Barlow Condensed,sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(player.num, bx, by);
          // Name below
          ctx.textBaseline='alphabetic';
          ctx.font='bold '+(22*S)+'px Barlow Condensed,sans-serif';
          ctx.fillStyle='#fff';
          ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=5*S;
          ctx.fillText(player.name, cx, cy+tokenR+26*S);
          ctx.shadowBlur=0;
          resolve();
        };
        img.onerror = () => {
          ctx.fillStyle='#000'; ctx.font='bold '+(26*S)+'px Barlow Condensed,sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(player.num, cx, cy);
          ctx.textBaseline='alphabetic';
          ctx.fillStyle='#fff'; ctx.font='bold '+(22*S)+'px Barlow Condensed,sans-serif';
          ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=5*S;
          ctx.fillText(player.name, cx, cy+tokenR+26*S);
          ctx.shadowBlur=0;
          resolve();
        };
        img.src = player.img;
      } else {
        ctx.fillStyle='#000'; ctx.font='bold '+(26*S)+'px Barlow Condensed,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(player.num, cx, cy);
        ctx.textBaseline='alphabetic';
        ctx.fillStyle='#fff'; ctx.font='bold '+(22*S)+'px Barlow Condensed,sans-serif';
        ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=5*S;
        ctx.fillText(player.name, cx, cy+tokenR+26*S);
        ctx.shadowBlur=0;
        resolve();
      }
    } else {
      // Empty slot
      ctx.beginPath(); ctx.arc(cx,cy,tokenR,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill();
      ctx.setLineDash([4*S,4*S]);
      ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.lineWidth=2*S; ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,255,255,.38)';
      ctx.font='bold '+(13*S)+'px Barlow Condensed,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(s.l, cx, cy);
      ctx.textBaseline='alphabetic';
      resolve();
    }
  })));

  // ── 4. Footer ────────────────────────────────────────────────────────────
  ctx.fillStyle='#07090d';
  ctx.fillRect(0, FH, FW, FOOTER);
  ctx.fillStyle='#f5c518';
  ctx.fillRect(0, FH, FW, 3*S);

  // Logo
  const logoS = FOOTER * 0.72;
  const logoX = FW * 0.05;
  const logoY = FH + (FOOTER - logoS) / 2;
  try {
    await new Promise(res => {
      const li = new Image();
      li.onload = () => { ctx.drawImage(li, logoX, logoY, logoS, logoS); res(); };
      li.onerror = res;
      setTimeout(res, 600);
      li.src = 'Top-Secret.png';
    });
  } catch(e) {}

  // Club name: TOP white · SECRET yellow · FC white
  const nameX = logoX + logoS + 12*S;
  const nameMid = FH + FOOTER * 0.45;
  ctx.textBaseline='middle';
  ctx.font='bold '+Math.round(FOOTER*0.3)+'px Barlow Condensed,sans-serif';
  ctx.textAlign='left';
  ctx.fillStyle='#ffffff'; ctx.fillText('TOP ', nameX, nameMid);
  const w1 = ctx.measureText('TOP ').width;
  ctx.fillStyle='#f5c518'; ctx.fillText('SECRET', nameX+w1, nameMid);
  const w2 = ctx.measureText('SECRET').width;
  ctx.fillStyle='#ffffff'; ctx.fillText(' FC', nameX+w1+w2, nameMid);

  // Subtitle
  const DAYS2=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS2=['Enero','Feb','Marzo','Abril','Mayo','Junio','Julio','Agosto','Sep','Oct','Nov','Dic'];
  const nd = new Date();
  const subStr = DAYS2[nd.getDay()]+' '+nd.getDate()+' de '+MONTHS2[nd.getMonth()];
  ctx.font=Math.round(FOOTER*0.2)+'px Barlow Condensed,sans-serif';
  ctx.fillStyle='rgba(255,255,255,.42)';
  ctx.fillText(subStr+' · '+lineup.formation, nameX, FH+FOOTER*0.75);

  // Formation pill
  const pw=FW*0.11, ph=FOOTER*0.46;
  const px=FW*0.85, py=FH+(FOOTER-ph)/2;
  ctx.fillStyle='rgba(245,197,24,.14)'; ctx.strokeStyle='rgba(245,197,24,.45)'; ctx.lineWidth=1.5*S;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,5*S); ctx.fill(); ctx.stroke();
  ctx.font='bold '+Math.round(FOOTER*0.28)+'px Barlow Condensed,sans-serif';
  ctx.fillStyle='#f5c518'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(lineup.formation, px+pw/2, py+ph/2);
  ctx.textBaseline='alphabetic';
  ctx.textBaseline='alphabetic';

  // ── 5. Download ──────────────────────────────────────────────────────────
  try {
    const dateStr = nd.getDate()+'-'+(nd.getMonth()+1)+'-'+nd.getFullYear();
    const link = document.createElement('a');
    link.download = 'TopSecret-FC-'+dateStr+'.png';
    link.href = cvs.toDataURL('image/png');
    link.click();

    const msg = buildWhatsAppMessage();
    try { await navigator.clipboard.writeText(msg); showToast('📸 Descargada · 📋 Mensaje copiado'); }
    catch(e) { window.prompt('Mensaje para WhatsApp:', msg); showToast('📸 Imagen descargada'); }
  } catch(e) { console.error(e); showToast('Error al generar imagen','info'); }

  btn.textContent = orig;
  btn.disabled = false;
};



window.cancelSlotSelect = function() {
  selectedSlotKey = null;
  document.getElementById('assignBanner').style.display='none';
  document.querySelector('.pitch-hint')?.classList.remove('selecting');
  render();
};

function selectSlot(key) {
  if (selectedSlotKey === key) {
    cancelSlotSelect();
    return;
  }
  selectedSlotKey = key;
  const slot = FORMATIONS[lineup.formation]?.find(s => s.key === key);
  const label = slot ? slot.l : key;
  document.getElementById('assignBanner').style.display='flex';
  document.getElementById('assignBannerText').textContent = '🎯 Asignando a ' + label + ' — tocá un jugador';
  document.querySelector('.pitch-hint')?.classList.add('selecting');
  render();
}

function assignPlayerToSelectedSlot(playerName) {
  if (!selectedSlotKey) return false;
  // Remove player from any other slot first
  Object.keys(lineup.slots).forEach(k => {
    if (lineup.slots[k] === playerName) delete lineup.slots[k];
  });
  lineup.slots[selectedSlotKey] = playerName;
  cancelSlotSelect();
  saveDay();
  render();
  return true;
}

window.selectSlot = selectSlot;
window.assignPlayerToSelectedSlot = assignPlayerToSelectedSlot;
