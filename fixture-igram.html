<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fixture VPN T2 · Top Secret FC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060709;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px;gap:18px;font-family:'Barlow',sans-serif;}
.dl-btn{padding:11px 36px;background:#C9A84C;color:#111;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;transition:background .15s;}
.dl-btn:hover{background:#E8C97A;}
.dl-btn:disabled{background:#555;color:#888;cursor:default;}

/* ── CARD 1080×1350 ── */
#card{
  width:1080px;height:1350px;
  background:#111111;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  padding:30px 36px 22px;
}

/* background accent lines */
#card::before{
  content:'';position:absolute;top:0;right:0;
  width:340px;height:100%;
  background:linear-gradient(135deg,transparent 60%,rgba(201,168,76,.04) 100%);
  pointer-events:none;
}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:18px;padding-bottom:18px;border-bottom:3px solid #C9A84C;flex-shrink:0;}
.hdr-logo{width:72px;height:72px;object-fit:contain;flex-shrink:0;}
.hdr-text{flex:1;}
.hdr-club{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:3.1rem;color:#fff;letter-spacing:-.01em;line-height:1;}
.hdr-sub{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;color:#C9A84C;letter-spacing:.14em;text-transform:uppercase;margin-top:5px;}
.hdr-league{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.hdr-league-logo{width:60px;height:60px;object-fit:contain;}
.hdr-league-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,197,24,.7);text-align:center;line-height:1.3;}

/* ── GROUPS ── */
.groups{flex:1;display:flex;flex-direction:column;padding-top:10px;gap:5px;overflow:hidden;}

.date-group{display:flex;flex-direction:column;gap:2px;}

.date-label{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
  color:#C9A84C;
  padding:4px 10px;
  border-left:3px solid #C9A84C;
  background:rgba(201,168,76,.06);
  border-radius:0 4px 4px 0;
}

.match-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px;
  border-radius:6px;
  background:rgba(255,255,255,.032);
  border:1px solid rgba(255,255,255,.055);
}

.round-badge{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.68rem;letter-spacing:.05em;
  color:#C9A84C;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.28);
  padding:3px 7px;border-radius:4px;
  min-width:34px;text-align:center;flex-shrink:0;
}

.ts-logo{width:26px;height:26px;object-fit:contain;opacity:.75;flex-shrink:0;}
.vs-sep{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;color:rgba(255,255,255,.2);flex-shrink:0;}
.rival-badge{width:36px;height:36px;border-radius:6px;object-fit:contain;background:#1a1d26;flex-shrink:0;}

.rival-name{
  flex:1;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.22rem;
  color:#fff;letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.loc-badge{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;flex-shrink:0;
}
.loc-home{background:rgba(62,207,142,.1);color:#3ecf8e;border:1px solid rgba(62,207,142,.28);}
.loc-away{background:rgba(74,158,255,.1);color:#4a9eff;border:1px solid rgba(74,158,255,.28);}

.match-time{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.85rem;
  color:rgba(255,255,255,.38);min-width:44px;text-align:right;flex-shrink:0;
}

/* ── CARD FOOTER ── */
.card-footer{
  flex-shrink:0;padding-top:10px;
  border-top:1px solid rgba(201,168,76,.2);
  display:flex;align-items:center;justify-content:space-between;
}
.card-footer-url{font-size:.62rem;color:rgba(255,255,255,.18);letter-spacing:.06em;}
.card-footer-ts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.68rem;color:rgba(201,168,76,.4);letter-spacing:.1em;}
</style>
</head>
<body>

<button class="dl-btn" id="dlBtn" onclick="dlImg()">📸 Descargar PNG</button>

<div id="card">
  <div class="hdr">
    <img class="hdr-logo" src="logos/Top Secret white.png" alt="Top Secret FC">
    <div class="hdr-text">
      <div class="hdr-club">TOP SECRET FC</div>
      <div class="hdr-sub">Fixture · Temporada 2</div>
    </div>
    <div class="hdr-league">
      <img class="hdr-league-logo" id="vpnLogo" src="https://www.virtualpronetwork.com/api/media/images/leagueslogos/6eadebd1a1d71aac3ff8b558b333bf1c.png" alt="VPN">
      <span class="hdr-league-name">VPN Argentina<br>1ra División</span>
    </div>
  </div>

  <div class="groups" id="groups">
    <div style="color:#555;font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;padding:40px;text-align:center;">Cargando fixtures…</div>
  </div>

  <div class="card-footer">
    <span class="card-footer-url">enohcaid.github.io/top-secret</span>
    <span class="card-footer-ts">@vpnargentina · TOP SECRET FC · 2026</span>
  </div>
</div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const PROXY  = 'https://top-secret-proxy.juan-c-m-1985.workers.dev/img-proxy?url=';

async function load() {
  const resp = await fetch('https://top-secret-proxy.juan-c-m-1985.workers.dev/vpn-fixtures');
  const fixtures = await resp.json();

  // Group by date, preserve order
  const grouped = [];
  const seen = {};
  fixtures.forEach(f => {
    if (!seen[f.date]) { seen[f.date] = []; grouped.push({ date: f.date, matches: seen[f.date] }); }
    seen[f.date].push(f);
  });

  document.getElementById('groups').innerHTML = grouped.map(({ date, matches }) => {
    const dt = new Date(date + 'T12:00:00');
    const label = `${DAYS[dt.getDay()]} ${dt.getDate()} de ${MONTHS[dt.getMonth()]}`;
    const rows = matches.map(m => `
      <div class="match-row">
        <span class="round-badge">J${m.round}</span>
        <img class="ts-logo" src="logos/Top Secret white.png" alt="TS">
        <span class="vs-sep">VS</span>
        <img class="rival-badge" src="${m.badge||''}" alt="" onerror="this.style.opacity='.15'">
        <span class="rival-name">${m.rival}</span>
        <span class="loc-badge ${m.isHome ? 'loc-home' : 'loc-away'}">${m.isHome ? 'Local' : 'Visita'}</span>
        <span class="match-time">${m.time}</span>
      </div>`).join('');
    return `<div class="date-group"><div class="date-label">${label}</div>${rows}</div>`;
  }).join('');
}

async function dlImg() {
  const btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando imagen…';
  btn.disabled = true;

  if (!window.html2canvas) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const card = document.getElementById('card');

  // Proxy todas las imágenes externas para CORS (rival badges + VPN logo)
  const extImgs = [...card.querySelectorAll('img.rival-badge, img.hdr-league-logo')];
  const origSrcs = extImgs.map(i => i.src);
  extImgs.forEach(i => { if (i.src) i.src = PROXY + encodeURIComponent(i.src); });
  if (extImgs.length) {
    await Promise.all(extImgs.map(i => new Promise(r => { i.onload = i.onerror = r; })));
  }

  const canvas = await html2canvas(card, { scale: 1, useCORS: true, backgroundColor: '#111111', width: 1080, height: 1350 });

  extImgs.forEach((i, idx) => { i.src = origSrcs[idx]; });

  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'fixture-vpn-t2-top-secret.png';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 4000);

  btn.textContent = '✅ Descargado';
  setTimeout(() => { btn.textContent = '📸 Descargar PNG'; btn.disabled = false; }, 2500);
}

load();
</script>
</body>
</html>
