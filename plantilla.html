<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Top Secret FC · El Plantel</title>
<link rel="icon" href="Top-Secret.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --black:   #111111;
  --white:   #FFFFFF;
  --gray:    #1C1C1C;
  --gold:    #C9A84C;
  --gold2:   #E8C97A;
  --mid:     rgba(255,255,255,.4);
  --border:  rgba(255,255,255,.09);
  --red:     #EF4444;
  --panel-w: 380px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--text, #F0F2F8);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  margin-left: 64px;
  margin-right: 48px;
  padding-top: 64px;
  transition: margin-right .45s cubic-bezier(.77,0,.18,1);
}
body.panel-open { margin-right: calc(48px + var(--panel-w)); }

/* ── PAGE HEADER ── */
.page-header { max-width: 1100px; margin: 0 auto; padding: 48px 32px 20px; }
.ph-eyebrow {
  font-size: .7rem; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.ph-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 900; line-height: .9; letter-spacing: -.01em;
  text-transform: uppercase; color: var(--text);
}
.ph-title span { color: var(--gold); }
.ph-sub { font-size: .85rem; color: var(--mid); margin-top: 10px; }

/* ── SEASON BAR ── */
.season-bar {
  max-width: 1100px; margin: 0 auto 20px;
  padding: 0 32px; display: flex; gap: 8px;
}
.season-pill {
  padding: 7px 22px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent; color: var(--mid);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .82rem; font-weight: 700; letter-spacing: .08em;
  cursor: pointer; transition: color .18s, border-color .18s, background-color .18s;
}
.season-pill:hover { border-color: var(--gold); color: var(--gold); }
.season-pill.active { background: var(--gold); border-color: var(--gold); color: var(--text); }

/* ── POSITION FILTER ── */
.pos-filter {
  max-width: 1100px; margin: 0 auto 32px;
  padding: 0 32px; display: flex; gap: 8px; flex-wrap: wrap;
}
.pfbtn {
  padding: 7px 18px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent; color: var(--mid);
  font-family: 'Barlow', sans-serif;
  font-size: .8rem; font-weight: 600;
  cursor: pointer; transition: color .18s, border-color .18s, background-color .18s;
}
.pfbtn:hover { border-color: var(--text); color: var(--text); }
.pfbtn.active { background: var(--black); border-color: var(--text); color: var(--white); }

/* ── SQUAD GRID ── */
.squad-grid {
  max-width: 1100px; margin: 0 auto; padding: 0 32px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 16px;
}

/* ── PLAYER CARD ── */
.player-card {
  background: var(--gray);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  border-radius: 0 0 8px 8px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  will-change: transform;
}
.player-card.hidden { display: none; }
.player-card.selected { border-top-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }

/* ── CARD IMAGE WRAP ── */
.card-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4/5;
  overflow: hidden;
  background: var(--black);
}
.player-card.v2 .card-img-wrap { background: var(--gray); }
.card-img-wrap::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, transparent 100%);
  pointer-events: none; z-index: 3;
}
.img-brazos {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  transform: scale(1.65) translateY(4%);
  transform-origin: top center;
  z-index: 1;
  will-change: transform, opacity;
}
.img-frente {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  transform: scale(1.65) translateY(4%);
  transform-origin: top center;
  opacity: 0; z-index: 2;
  will-change: opacity;
}

/* ── CARD FOOTER ── */
.card-footer {
  padding: 11px 14px;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.cf-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem; font-weight: 900;
  color: var(--gold); line-height: 1;
  margin-bottom: 1px;
}
.cf-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .9rem; font-weight: 800;
  color: var(--text); letter-spacing: .02em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2; max-width: 130px;
}
.cf-posn { font-size: .66rem; color: var(--mid); letter-spacing: .04em; margin-top: 2px; }
.cf-right { flex-shrink: 0; margin-left: 6px; padding-top: 3px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.flag-circle {
  width: 20px; height: 20px; border-radius: 50%; overflow: hidden;
  border: 1.5px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.12);
  flex-shrink: 0;
}
.flag-circle img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
.pos-badge {
  display: inline-block; padding: 3px 8px; border-radius: 4px;
  font-size: .6rem; font-weight: 700; letter-spacing: .1em;
  border: 1px solid var(--border); color: var(--mid); background: var(--gray);
}
.player-card[data-pos="POR"] .pos-badge { border-color: #b8c050; color: #5a7010; background: rgba(184,192,80,.08); }
.player-card[data-pos="DEF"] .pos-badge { border-color: #6a9ab8; color: #1a5a80; background: rgba(106,154,184,.08); }
.player-card[data-pos="LAT"] .pos-badge { border-color: #5a7aaa; color: #1a4878; background: rgba(90,122,170,.08); }
.player-card[data-pos="MED"] .pos-badge { border-color: #888; color: #444; background: rgba(136,136,136,.08); }
.player-card[data-pos="DEL"] .pos-badge { border-color: #c07050; color: #903020; background: rgba(192,112,80,.08); }

/* ── PLACEHOLDER ── */
.card-placeholder {
  position: absolute; inset: 0; background: var(--black);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1;
}
.ph-svg-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover; opacity: .07; z-index: 0;
}
.ph-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 4.5rem; font-weight: 900; color: var(--gold);
  line-height: 1; position: relative; z-index: 1;
}
.ph-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .72rem; font-weight: 700; color: rgba(255,255,255,.5);
  letter-spacing: .08em; text-transform: uppercase;
  position: relative; z-index: 1; margin-top: 4px;
}

/* ── BACKDROP ── */
#panel-backdrop {
  display: none;
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,.3);
  backdrop-filter: blur(2px);
}

/* ── PLAYER PANEL ── */
#player-panel {
  display: none;
  position: fixed; top: 64px; right: 48px; z-index: 500;
  width: var(--panel-w);
  height: calc(100vh - 64px);
  background: var(--black);
  border-left: 3px solid var(--gold);
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.pp-photo-wrap {
  position: relative;
  width: 100%; height: 340px;
  overflow: hidden; flex-shrink: 0;
  background: #0a0a0a;
}
.pp-photo {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: top center;
  transform: scale(1.6) translateY(4%);
  transform-origin: top center;
}
.pp-photo-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
}
.pp-photo-placeholder img { width: 100%; height: 100%; object-fit: cover; opacity: .08; }
.pp-ph-num {
  position: absolute;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 6rem; font-weight: 900; color: var(--gold); opacity: .6;
}
.pp-photo-grad {
  position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
  background: linear-gradient(to top, var(--black) 0%, transparent 100%);
  z-index: 2; pointer-events: none;
}
.pp-close {
  position: absolute; top: 14px; right: 14px; z-index: 10;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,.6); border: 1px solid rgba(201,168,76,.4);
  color: rgba(255,255,255,.7); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; transition: color .15s, background-color .15s, border-color .15s;
}
.pp-close:hover { background: rgba(201,168,76,.2); color: var(--white); border-color: var(--gold); }
.pp-identity {
  position: absolute; bottom: 16px; left: 18px; z-index: 3;
}
.pp-badge {
  font-size: .62rem; font-weight: 800; letter-spacing: .14em;
  text-transform: uppercase; color: var(--gold);
  background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.3);
  padding: 2px 8px; border-radius: 3px; display: inline-block;
  margin-bottom: 6px;
}
.pp-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.2rem; font-weight: 900; color: var(--gold);
  line-height: 1; letter-spacing: -.01em;
}
.pp-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.25rem; font-weight: 900; color: var(--white);
  letter-spacing: .04em; line-height: 1.1; margin-top: 2px;
}
.pp-posn { font-size: .72rem; color: rgba(255,255,255,.5); margin-top: 3px; letter-spacing: .06em; }

.pp-body {
  padding: 20px 20px 32px;
  display: flex; flex-direction: column; gap: 20px;
}
.pp-kpis {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.pp-kpi {
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
  border-top: 2px solid var(--gold); border-radius: 4px;
  padding: 10px 10px 8px; text-align: center;
}
.pp-kpi-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem; font-weight: 900; color: var(--white); line-height: 1;
}
.pp-kpi-lbl {
  font-size: .58rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: rgba(255,255,255,.4); margin-top: 3px;
}

.pp-rend-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.pp-rend-item { text-align: center; }
.pp-rend-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem; font-weight: 900; color: rgba(201,168,76,.85); line-height: 1;
}
.pp-rend-lbl {
  font-size: .58rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,.3); margin-top: 3px;
}

.pp-section-title {
  font-size: .65rem; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  margin-bottom: 12px;
}
.pp-stat-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.pp-stat-lbl {
  font-size: .68rem; font-weight: 700; letter-spacing: .08em;
  color: rgba(255,255,255,.45); width: 38px; flex-shrink: 0;
  text-transform: uppercase;
}
.pp-stat-track {
  flex: 1; height: 3px; background: rgba(255,255,255,.08);
  border-radius: 2px; overflow: hidden;
}
.pp-stat-fill {
  height: 100%; background: var(--gold); border-radius: 2px;
  transform-origin: left;
}
.pp-stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .9rem; font-weight: 800; color: var(--white);
  width: 28px; text-align: right; flex-shrink: 0;
}
.pp-total {
  display: flex; align-items: center; gap: 10px;
  padding-top: 12px; border-top: 1px solid rgba(255,255,255,.07);
}
.pp-total-lbl {
  font-size: .65rem; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: rgba(255,255,255,.3); flex-shrink: 0;
}
.pp-total-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem; font-weight: 900; color: var(--gold);
  flex-shrink: 0;
}
.pp-total-track {
  flex: 1; height: 3px; background: rgba(255,255,255,.08);
  border-radius: 2px; overflow: hidden;
}
.pp-total-fill {
  height: 100%; background: var(--gold); border-radius: 2px;
  transform-origin: left;
}

/* medals */
.pp-medal-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
}
.pp-medal {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 900; flex-shrink: 0;
}
.pp-medal.m1 { background: #c9a227; color: #5a3800; }
.pp-medal.m2 { background: #8a96aa; color: #1a2040; }
.pp-medal.m3 { background: #a07038; color: #3a1800; }
.pp-medal-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .88rem; font-weight: 700; color: rgba(255,255,255,.8);
  flex: 1;
}
.pp-medal-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .88rem; font-weight: 700; color: var(--gold);
}

/* download button */
.pp-dl-btn {
  width: 100%; padding: 10px 14px;
  background: transparent; border: 1px solid rgba(201,168,76,.3);
  border-radius: 6px; color: rgba(201,168,76,.7);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .82rem; font-weight: 700; letter-spacing: .08em;
  cursor: pointer; transition: color .18s, border-color .18s, background-color .18s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.pp-dl-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.07); }
.pp-dl-btn:active { opacity: .7; }

/* ── T2 PLACEHOLDER ── */
.t2-soon { max-width: 1100px; margin: 0 auto; padding: 0 32px 80px; display: none; }
.t2-card {
  background: var(--gray); border: 1px solid var(--border);
  border-top: 3px solid var(--gold); border-radius: 0 0 8px 8px;
  padding: 64px 32px; text-align: center;
}
.t2-icon { font-size: 2.5rem; margin-bottom: 20px; opacity: .15; }
.t2-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem; font-weight: 900; letter-spacing: .18em; color: var(--gold); margin-bottom: 10px;
}
.t2-sub { font-size: .85rem; color: var(--mid); line-height: 1.6; }

/* ── FOOTER ── */
footer {
  background: var(--black); color: #555;
  text-align: center; padding: 28px 24px;
  font-size: .75rem; letter-spacing: .1em;
  margin-left: -64px; margin-right: -48px;
}
footer span { color: var(--gold); }

@media(max-width:640px){
  body { margin-left: 0; margin-right: 0; padding-top: 64px; }
  body.panel-open { margin-right: 0; }
  .sidebar-left { display: none; }
  .sidebar-right { display: none; }
  .squad-grid { grid-template-columns: repeat(auto-fill,minmax(148px,1fr)); padding: 0 12px 80px; gap:10px; }
  .page-header { padding: 20px 12px 12px; }
  .season-bar, .pos-filter { padding: 0 12px; flex-wrap:wrap; gap:6px; }
  #player-panel { right: 0; width: 100%; border-radius:16px 16px 0 0; bottom:0; top:auto; max-height:85vh; }
  .card-info { padding: 8px 10px 10px; }
  .card-num { font-size:1.4rem; }
  .card-name { font-size:1rem; }
}

/* ── NUMERIC RENDERING ── */
.card-num, .pp-num, .stat-val { font-variant-numeric: tabular-nums; }

/* ── TEXT BALANCE ── */
.ph-title { text-wrap: balance; }

/* ── ACTIVE PRESS STATES ── */
.season-pill:active, .pfbtn:active, .pp-dl-btn:active { transform: scale(0.97); }

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<!-- PAGE HEADER -->
<div class="page-header">
  <div class="ph-eyebrow">Temporada 2 · 2026</div>
  <h1 class="ph-title">El <span>Plantel</span></h1>
  <p class="ph-sub">Top Secret Football Club</p>
</div>

<!-- SEASON BAR -->
<div class="season-bar">
  <button class="season-pill" onclick="switchSeason(1, this)">T1 · 2026</button>
  <button class="season-pill" onclick="switchSeason(2, this)">T2 · 2026 <span style="font-size:.6rem;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:800;background:rgba(255,255,255,.1);color:var(--muted);">FINALIZADA</span></button>
  <button class="season-pill active" onclick="switchSeason(3, this)">T3 · 2026</button>
</div>

<!-- T1 CONTENT -->
<div id="t1-content" style="display:none">
  <div class="pos-filter">
    <button class="pfbtn active" onclick="filterPos('all', this)">Todos</button>
    <button class="pfbtn" onclick="filterPos('POR', this)">POR</button>
    <button class="pfbtn" onclick="filterPos('DEF', this)">DEF</button>
    <button class="pfbtn" onclick="filterPos('LAT', this)">LAT</button>
    <button class="pfbtn" onclick="filterPos('MED', this)">MED</button>
    <button class="pfbtn" onclick="filterPos('DEL', this)">DEL</button>
  </div>
  <div class="squad-grid" id="squadGrid"></div>
</div>

<!-- T2 CONTENT -->
<div id="t2-content" style="display:none">
  <div class="pos-filter" id="pos-filter-t2">
    <button class="pfbtn active" onclick="filterPos2('all', this)">Todos</button>
    <button class="pfbtn" onclick="filterPos2('POR', this)">POR</button>
    <button class="pfbtn" onclick="filterPos2('DEF', this)">DEF</button>
    <button class="pfbtn" onclick="filterPos2('LAT', this)">LAT</button>
    <button class="pfbtn" onclick="filterPos2('MED', this)">MED</button>
    <button class="pfbtn" onclick="filterPos2('DEL', this)">DEL</button>
  </div>
  <div class="squad-grid" id="squadGrid2"></div>
</div>

<!-- T3 CONTENT -->
<div id="t3-content">
  <div class="pos-filter" id="pos-filter-t3">
    <button class="pfbtn active" onclick="filterPos3('all', this)">Todos</button>
    <button class="pfbtn" onclick="filterPos3('POR', this)">POR</button>
    <button class="pfbtn" onclick="filterPos3('DEF', this)">DEF</button>
    <button class="pfbtn" onclick="filterPos3('LAT', this)">LAT</button>
    <button class="pfbtn" onclick="filterPos3('MED', this)">MED</button>
    <button class="pfbtn" onclick="filterPos3('DEL', this)">DEL</button>
  </div>
  <div class="squad-grid" id="squadGrid3"></div>
</div>

<!-- BACKDROP -->
<div id="panel-backdrop" onclick="closePanel()"></div>

<!-- PLAYER PANEL -->
<div id="player-panel">
  <div class="pp-photo-wrap" id="pp-photo-wrap">
    <button class="pp-close" onclick="closePanel()">✕</button>
    <div class="pp-photo-grad"></div>
    <div class="pp-identity">
      <div class="pp-badge" id="pp-badge">MED</div>
      <div class="pp-num" id="pp-num">#32</div>
      <div class="pp-name" id="pp-name">CipriMancini</div>
      <div class="pp-posn" id="pp-posn">Mediocampista</div>
    </div>
  </div>

  <div class="pp-body">
    <!-- Static KPIs -->
    <div class="pp-kpis">
      <div class="pp-kpi">
        <div class="pp-kpi-val" id="pk-nvl">—</div>
        <div class="pp-kpi-lbl">Nivel</div>
      </div>
      <div class="pp-kpi">
        <div class="pp-kpi-val" id="pk-pj">—</div>
        <div class="pp-kpi-lbl">Partidos</div>
      </div>
      <div class="pp-kpi">
        <div class="pp-kpi-val" id="pk-total">—</div>
        <div class="pp-kpi-lbl">Score</div>
      </div>
    </div>

    <!-- Live rendimiento -->
    <div id="pp-rend-wrap">
      <div class="pp-section-title">Rendimiento · Temporada</div>
      <div class="pp-rend-grid">
        <div class="pp-rend-item">
          <div class="pp-rend-val" id="pk-g">—</div>
          <div class="pp-rend-lbl">Goles</div>
        </div>
        <div class="pp-rend-item">
          <div class="pp-rend-val" id="pk-a">—</div>
          <div class="pp-rend-lbl">Asist.</div>
        </div>
        <div class="pp-rend-item">
          <div class="pp-rend-val" id="pk-rat">—</div>
          <div class="pp-rend-lbl">Rating</div>

function renderFolder(p) { return p.folderOverride || p.key; }

function frontePath(p)   { return `Renders/${renderFolder(p)}/Frente.png`; }

/* ─── COMPUTE STATS ─── */
function computePlayerStats(matches) {
  const s = {};
  matches.forEach(m => {
    m.players.forEach(pl => {
      const k = pl.matched || pl.name;
      if (!s[k]) s[k] = {pj:0, g:0, a:0, ratings:[]};
      s[k].pj++;
      s[k].g += (pl.goals || 0);
      s[k].a += (pl.assists || 0);
      if (pl.rating != null) s[k].ratings.push(pl.rating);
    });
  });
  Object.keys(s).forEach(k => {
    const p = s[k];
    p.ga = p.g + p.a;
    p.avgRating = p.ratings.length ? +(p.ratings.reduce((a,b)=>a+b,0)/p.ratings.length).toFixed(2) : 0;
    p.maxRating = p.ratings.length ? Math.max(...p.ratings) : 0;
  });
  return s;
}

/* ─── COMPUTE RANKINGS ─── */
function computeRankings(stats, rosterKeys) {
  const cats = [
    {key:'g',         label:'Goles',        fn:x=>x.g},
    {key:'a',         label:'Asistencias',  fn:x=>x.a},
    {key:'ga',        label:'G + A',         fn:x=>x.ga},
    {key:'avgRating', label:'Rating prom.',  fn:x=>x.avgRating, fmt:v=>v.toFixed(2)},
    {key:'pj',        label:'Regularidad',  fn:x=>x.pj},
    {key:'maxRating', label:'Rating máx.',  fn:x=>x.maxRating, fmt:v=>v.toFixed(1)},
  ];
  const rankings = {};
  cats.forEach(cat => {
    const candidates = rosterKeys
      .filter(k => stats[k] && stats[k].pj > 0)
      .map(k => ({key:k, val: cat.fn(stats[k])}))
      .filter(x => x.val > 0)
      .sort((a,b) => b.val - a.val);
    candidates.slice(0,3).forEach((item, i) => {
      if (!rankings[item.key]) rankings[item.key] = [];
      const dispVal = cat.fmt ? cat.fmt(item.val) : item.val;
      rankings[item.key].push({medal:i+1, label:cat.label, val:dispVal});
    });
  });
  return rankings;
}

/* ─── BUILD CARD ─── */
function buildCard(p, useV2 = false, useV3 = false) {
  const card = document.createElement('div');
  card.className = useV3 ? 'player-card v3' : (useV2 ? 'player-card v2' : 'player-card');
  card.dataset.pos = p.pos;
  card.dataset.key = p.key;

  const ph = `<div class="card-placeholder" style="display:none">
    <img class="ph-svg-bg" src="${svgPath(p)}" alt="" onerror="this.style.display='none'">
    <div class="ph-num">#${p.num}</div>
    <div class="ph-name">${p.key}</div>
  </div>`;

  const bSrc  = useV3 ? brazos3Path(p) : (useV2 ? brazos2Path(p) : brazosPath(p));
  const bFall = useV3 ? brazos2Path(p) : brazosPath(p);
  const bFall2 = useV3 ? brazosPath(p) : null;
  const fSrc  = useV3 ? frente3Path(p) : (useV2 ? frente2Path(p) : frontePath(p));
  const fFall = useV3 ? frente2Path(p) : frontePath(p);
  const fFall2 = useV3 ? frontePath(p) : null;

  const bErr = bFall2
    ? `if(!this._f){this._f=1;this.src='${bFall}';}else if(!this._f2){this._f2=1;this.src='${bFall2}';}else{this.style.display='none';this.parentElement.querySelector('.card-placeholder').style.display='flex';}`
    : `if(!this._f){this._f=1;this.src='${bFall}';}else{this.style.display='none';this.parentElement.querySelector('.card-placeholder').style.display='flex';}`;
  const fErr = fFall2
    ? `if(!this._f){this._f=1;this.src='${fFall}';}else if(!this._f2){this._f2=1;this.src='${fFall2}';}else{this.dataset.missing='1';this.style.display='none';}`
    : `if(!this._f){this._f=1;this.src='${fFall}';}else{this.dataset.missing='1';this.style.display='none';}`;

  const imgHtml = `<div class="card-img-wrap">
    <img class="img-brazos" src="${bSrc}" alt="${p.key}" onerror="${bErr}">
    <img class="img-frente" src="${fSrc}" alt="${p.key} frente" onerror="${fErr}">
    ${ph}
  </div>`;

  card.innerHTML = `${imgHtml}
    <div class="card-footer">
      <div class="cf-left">
        <div class="cf-num">#${p.num}</div>
        <div class="cf-name">${p.key}</div>
        <div class="cf-posn">${p.posn}</div>
      </div>
      <div class="cf-right">
        <span class="pos-badge">${p.pos}</span>
        <div class="flag-circle"><img src="https://flagcdn.com/w40/${p.nat||'ar'}.png" alt="${p.nat==='uy'?'Uruguay':'Argentina'}"></div>
      </div>
    </div>`;

  const brazos = card.querySelector('.img-brazos');
  const frente = card.querySelector('.img-frente');

  card.addEventListener('mouseenter', () => {
    gsap.to(card, {y: -6, duration: 0.25, ease: 'power2.out'});
    if (!frente.dataset.missing) {
      gsap.to(brazos, {opacity: 0, duration: 0.4, ease: 'power2.inOut'});
      gsap.to(frente, {opacity: 1, duration: 0.4, ease: 'power2.inOut'});
    }
  });
  card.addEventListener('mouseleave', () => {
    gsap.to(card, {y: 0, duration: 0.25, ease: 'power2.out'});
    if (!frente.dataset.missing) {
      gsap.to(brazos, {opacity: 1, duration: 0.4, ease: 'power2.inOut'});
      gsap.to(frente, {opacity: 0, duration: 0.4, ease: 'power2.inOut'});
    }
  });
  card.addEventListener('click', () => {
    gsap.to(card, {scale: 0.97, duration: 0.08, yoyo: true, repeat: 1, ease: 'power1.inOut',
      onComplete: () => openPanel(p, card)
    });
  });

  return card;
}

    opacity: 0, y: 28, duration: 0.45, stagger: 0.045, ease: 'power2.out'
  });
}

function filterPos2(pos, btn) {
  document.querySelectorAll('#pos-filter-t2 .pfbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const wasOpen = document.getElementById('player-panel').style.display === 'flex';
  if (wasOpen) closePanel(false);
  renderGrid2(pos);
}
window.filterPos2 = filterPos2;

/* ─── T3 GRID ─── */
let currentFilter3 = 'all';

function renderGrid3(filter) {
  currentFilter3 = filter;
  const grid = document.getElementById('squadGrid3');
  grid.innerHTML = '';
  const visible = ROSTER_T3.filter(p => filter === 'all' || p.pos === filter);
  visible.forEach(p => grid.appendChild(buildCard(p, false, true)));
  gsap.from(grid.querySelectorAll('.player-card'), {
    opacity: 0, y: 28, duration: 0.45, stagger: 0.045, ease: 'power2.out'
  });
}

function filterPos3(pos, btn) {
  document.querySelectorAll('#pos-filter-t3 .pfbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const wasOpen = document.getElementById('player-panel').style.display === 'flex';
  if (wasOpen) closePanel(false);
  renderGrid3(pos);
}
window.filterPos3 = filterPos3;

/* ─── OPEN PANEL ─── */
function openPanel(p, card) {
  _currentPlayer = p;

  if (selectedCard) selectedCard.classList.remove('selected');
  selectedCard = card;
  card.classList.add('selected');

  /* photo */
  const photoWrap = document.getElementById('pp-photo-wrap');
  photoWrap.querySelectorAll('.pp-photo,.pp-photo-placeholder').forEach(el => el.remove());

  const isT2 = card.classList.contains('v2');
  const isT3 = card.classList.contains('v3');

  const img = document.createElement('img');
  img.className = 'pp-photo';
  img.alt = p.key;
  const ppFallbacks = isT3
    ? [pose3Path(p), brazos3Path(p), brazos2Path(p), brazosPath(p)]
    : [brazos2Path(p), brazosPath(p)];
  let ppFi = 0;
  img.onerror = function() {
    ppFi++;
    if (ppFi < ppFallbacks.length) { this.src = ppFallbacks[ppFi]; return; }
    this.remove();
    const ph = document.createElement('div');
    ph.className = 'pp-photo-placeholder';
    ph.innerHTML = `<img src="${svgPath(p)}" alt="" style="opacity:.08;width:100%;height:100%;object-fit:cover;"
      onerror="this.style.display='none'">
      <div class="pp-ph-num">#${p.num}</div>`;
    photoWrap.insertBefore(ph, photoWrap.firstChild);
  };
  img.src = ppFallbacks[0];
  photoWrap.insertBefore(img, photoWrap.firstChild);

  /* identity */
  document.getElementById('pp-badge').textContent = p.pos;
  document.getElementById('pp-num').textContent   = '#' + p.num;
  document.getElementById('pp-name').textContent  = p.key;
  document.getElementById('pp-posn').textContent  = p.posn;

  /* KPIs */
  const statMap = isT3 ? t3Stats : (isT2 ? t2Stats : allStats);
  const st = statMap[p.key] || {pj:0, g:0, a:0, avgRating:0, maxRating:0};
  document.getElementById('pk-nvl').textContent   = p.nvl;
  document.getElementById('pk-pj').textContent    = st.pj || '—';
  document.getElementById('pk-total').textContent = p.total;

  /* rendimiento */
  document.getElementById('pk-g').textContent   = st.pj ? st.g : '—';
  document.getElementById('pk-a').textContent   = st.pj ? st.a : '—';
  document.getElementById('pk-rat').textContent = st.pj ? st.avgRating.toFixed(2) : '—';

  /* stat bars */
  const barsEl = document.getElementById('pp-stats-bars');
  barsEl.innerHTML = '';
  p.stats.forEach(s => {
    const row = document.createElement('div');
    row.className = 'pp-stat-row';
    row.innerHTML = `
      <span class="pp-stat-lbl">${s.l}</span>
      <div class="pp-stat-track"><div class="pp-stat-fill" style="width:${s.v}%"></div></div>
      <span class="pp-stat-val">${s.v}</span>`;
    barsEl.appendChild(row);
  });
  document.getElementById('pk-total-val').textContent = p.total;
  document.getElementById('pk-total-bar').style.width = Math.min(100, p.total / 400 * 100) + '%';

  /* perfil */
  document.getElementById('pk-build').textContent = p.build;
  document.getElementById('pk-arq').textContent   = p.arq;

  /* medals */
  const rankMap = isT3 ? t3Rankings : (isT2 ? t2Rankings : allRankings);
  const medals = rankMap[p.key] || [];
  const mc = ['m1','m2','m3'];
  const medalsEl = document.getElementById('pp-medals');
  medalsEl.innerHTML = medals.length
    ? medals.map(m => `<div class="pp-medal-row">
        <div class="pp-medal ${mc[m.medal-1]}">${m.medal}</div>
        <span class="pp-medal-lbl">${m.label}</span>
        <span class="pp-medal-val">${m.val}</span>
      </div>`).join('')
    : `<div style="font-size:.75rem;color:rgba(255,255,255,.3)">Sin medallas esta temporada</div>`;

  /* download button visibility */
  const dlBtn = document.getElementById('pp-dl-btn');
  dlBtn.style.display = 'flex';

  /* show panel */
  const panel    = document.getElementById('player-panel');
  const backdrop = document.getElementById('panel-backdrop');
  panel.style.display = 'flex';
  backdrop.style.display = 'block';
  document.body.classList.add('panel-open');

  gsap.fromTo(panel, {x:'100%'}, {x:'0%', duration:0.5, ease:'power3.out'});
  gsap.fromTo(backdrop, {opacity:0}, {opacity:1, duration:0.3});

  /* animate bars */
  const fills  = panel.querySelectorAll('.pp-stat-fill, .pp-total-fill');
  const widths = Array.from(fills).map(el => el.style.width);
  fills.forEach(el => { el.style.width = '0%'; });
  gsap.to(fills, {width:(i)=>widths[i], duration:0.6, ease:'power2.out', delay:0.35, stagger:0.06});
  gsap.from('.pp-kpi', {opacity:0, y:12, duration:0.4, stagger:0.07, delay:0.3, ease:'power2.out'});
}

/* ─── CLOSE PANEL ─── */
function closePanel(animate = true) {
  const panel    = document.getElementById('player-panel');
  const backdrop = document.getElementById('panel-backdrop');
  if (selectedCard) { selectedCard.classList.remove('selected'); selectedCard = null; }
  document.body.classList.remove('panel-open');
  if (!animate) {
    panel.style.display = 'none';
    backdrop.style.display = 'none';
    return;
  }
  gsap.to(panel,    {x:'100%', duration:0.38, ease:'power2.in', onComplete:()=>{ panel.style.display='none'; }});
  gsap.to(backdrop, {opacity:0, duration:0.28, onComplete:()=>{ backdrop.style.display='none'; }});
}
window.closePanel = closePanel;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

/* ─── DOWNLOAD GRAPHICS ─── */
function downloadGraphics() {
  const p = _currentPlayer;
  if (!p) return;
  const folder = p.folderOverride || p.key;
  const files = [
    {name: 'Portada.png', path: `Renders/${folder}/Portada.png`},
  ];
  if (p.photo) {
    files.push({name: 'Foto de perfil.png', path: `Renders/${folder}/Foto de perfil.png`});
  }
  files.forEach(f => {
    const a = document.createElement('a');
    a.href = f.path;
    a.download = f.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
}
window.downloadGraphics = downloadGraphics;
