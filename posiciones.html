<style>
:root {
  --black:  #111111;
  --white:  #FFFFFF;
  --gray:   #1C1C1C;
  --gold:   #C9A84C;
  --gold2:  #E8C97A;
  --mid:    rgba(255,255,255,.4);
  --border: rgba(255,255,255,.09);
  --vpn:    #F5C518;
  --vpug:   #3ECF8E;
  --e11:    #4A9EFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--text, #F0F2F8);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  margin-left: 64px;
  margin-right: 48px;
  padding-top: 64px;
}

/* ── PAGE HEADER ── */
.page-header { max-width: 1100px; margin: 0 auto; padding: 56px 32px 24px; }
.ph-eyebrow {
  font-size: .7rem; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.ph-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 900; line-height: .9; letter-spacing: -.01em;
  text-transform: uppercase; color: var(--text);
}
.ph-title span { color: var(--gold); }
.ph-sub { font-size: .85rem; color: var(--mid); margin-top: 10px; }

/* ── WRAP ── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 32px 80px; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 0; margin-bottom: 32px;
  border-bottom: 2px solid var(--border);
}
.tab {
  padding: 10px 24px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: .08em;
  color: var(--mid); background: none; border: none;
  cursor: pointer; border-bottom: 3px solid transparent;
  margin-bottom: -2px; transition: color .18s, border-bottom-color .18s;
}
.tab:hover { color: var(--text); }
.tab[data-league="vpn"].active   { color: var(--vpn);  border-bottom-color: var(--vpn);  }
.tab[data-league="vpug"].active  { color: var(--vpug); border-bottom-color: var(--vpug); }
.tab[data-league="e11"].active   { color: var(--e11);  border-bottom-color: var(--e11);  }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── LOADING / ERROR ── */
.loading-state {
  padding: 48px 0; text-align: center;
  font-size: .85rem; color: var(--mid);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.loading-state::before {
  content: ''; display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  padding: 32px 0; text-align: center; font-size: .85rem; color: var(--mid);
}
.error-state button {
  margin-left: 8px; padding: 4px 14px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; font-size: .8rem;
  color: var(--gold); border-color: var(--gold);
}

/* ── TABLE ── */
.standings-table {
  width: 100%; border-collapse: collapse;
  background: var(--gray); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.standings-table thead th {
  padding: 10px 12px;
  font-size: .65rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--mid);
  background: var(--gray); border-bottom: 2px solid var(--border);
  text-align: center;
}
.standings-table thead th.left { text-align: left; }
.standings-table tbody tr { border-bottom: 1px solid var(--border); }
.standings-table tbody tr:last-child { border-bottom: none; }
.standings-table tbody tr:hover { background: #fafaf6; }
.standings-table tbody tr.highlight { background: rgba(201,168,76,.05); }
.standings-table tbody tr.highlight:hover { background: rgba(201,168,76,.09); }
td {
  padding: 10px 12px;
  font-size: .85rem; text-align: center; vertical-align: middle;
}
td.left { text-align: left; }

.td-pos {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem; font-weight: 900;
  color: var(--mid); width: 32px;
}
.td-pos.p1 { color: var(--gold); }
.td-pos.p2 { color: #888; }
.td-pos.p3 { color: #a07040; }

.td-team {
  display: flex; align-items: center; gap: 10px;
  min-width: 0;
}
.td-logo {
  width: 28px; height: 28px; border-radius: 4px;
  object-fit: contain; flex-shrink: 0;
  background: var(--gray);
}
.td-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .92rem; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.td-name.us { color: var(--gold); }

.td-pts {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem; font-weight: 900; color: var(--text);
}

.td-gd { font-weight: 600; }
.td-gd.pos { color: var(--vpug); }
.td-gd.neg { color: #c0392b; }

.zone-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 6px; flex-shrink: 0;
}

/* zone legend */
.zone-legend {
  display: flex; gap: 20px; flex-wrap: wrap;
  margin-top: 16px; padding: 12px 16px;
  background: var(--gray); border-radius: 8px;
  border: 1px solid var(--border);
}
.zl-item { display: flex; align-items: center; gap: 6px; font-size: .72rem; color: var(--mid); }

/* ── SEASON SELECTOR ── */
.season-sel { display:flex; gap:8px; margin-bottom:28px; }
.season-btn {
  padding:8px 22px; border-radius:24px; cursor:pointer; transition:color .2s, border-color .2s, background-color .2s;
  font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.08em;
  border:2px solid var(--border); background:transparent; color:var(--mid);
  display:flex; flex-direction:column; align-items:center; gap:1px;
}
.season-btn .sb-label { font-size:.95rem; }
.season-btn .sb-sub   { font-size:.6rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
.season-btn:hover { border-color:#bbb; color:var(--black); }
.season-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.07); }

/* ── PRÓXIMAMENTE ── */
.prox-wrap { padding:64px 0; text-align:center; }
.prox-badge {
  display:inline-block; padding:5px 16px; border-radius:20px;
  background:rgba(201,168,76,.1); border:1px solid rgba(201,168,76,.3);
  font-size:.65rem; font-weight:700; letter-spacing:.18em; color:var(--gold);
  text-transform:uppercase; margin-bottom:20px;
}
.prox-title {
  font-family:'Barlow Condensed',sans-serif; font-size:3rem; font-weight:900;
  letter-spacing:-.01em; color:var(--black); text-transform:uppercase; line-height:1;
  margin-bottom:10px;
}
.prox-sub { font-size:.88rem; color:var(--mid); max-width:420px; margin:0 auto; }
.prox-tables { margin-top:40px; opacity:.35; pointer-events:none; }

/* ── GROUP HEADER ── */
.group-header {
  font-family:'Barlow Condensed',sans-serif; font-size:.7rem; font-weight:800;
  letter-spacing:.18em; text-transform:uppercase; color:var(--mid);
  padding:18px 0 8px; border-top:1px solid var(--border); margin-top:24px;
}
.group-header:first-child { border-top:none; margin-top:0; padding-top:0; }

/* ── T1 BADGE ── */
.t1-badge {
  display:inline-flex; align-items:center; gap:6px; padding:3px 10px;
  border-radius:4px; background:rgba(201,168,76,.1);
  font-size:.62rem; font-weight:700; letter-spacing:.12em;
  color:var(--gold); text-transform:uppercase; margin-bottom:16px;
}


/* ── TABLE ROWS ANIMATION ── */
tbody tr { opacity: 0; }

/* ── FOOTER ── */
footer {
  background: var(--black); color: #555;
  text-align: center; padding: 28px 24px;
  font-size: .75rem; letter-spacing: .1em;
  margin-left: -64px; margin-right: -48px;
}
footer span { color: var(--gold); }

@media(max-width:640px){
  .page-header{ padding:20px 12px 12px; }
  .wrap{ padding:0 12px 80px; }
  .season-sel{ flex-wrap:wrap; gap:6px; }
  .tabs{ overflow-x:auto; scrollbar-width:none; gap:0; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ padding:10px 16px; font-size:.78rem; white-space:nowrap; flex-shrink:0; }
  .table-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  table{ min-width:480px; }
  .prox-wrap{ padding:32px 0; }
  .zl-grid{ flex-direction:column; gap:8px; }
}

/* ── NUMERIC RENDERING ── */
td[data-pts], .pts-col { font-variant-numeric: tabular-nums; }

/* ── ACTIVE PRESS STATES ── */
.tab:active, .season-btn:active { transform: scale(0.97); }

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
}

</style>
</head>

/* ── NORMALIZERS ── */
function normVPN(raw) {
  const LOGO_BASE = 'https://www.virtualpronetwork.com/api/media/images/teamlogos/';
  return raw
    .map(e => ({
      name: e.team.name,
      abbr: e.team.short_name || e.team.name.slice(0,3).toUpperCase(),
      logo: e.team.logo1 ? LOGO_BASE + e.team.logo1 : (e.team.logo ? LOGO_BASE + e.team.logo : null),
      gp: e.gp, w: e.gw, d: e.gt, l: e.gl, gf: e.gf, gc: e.gc, gd: e.gd, pts: e.pts,
      us: /top.?secret/i.test(e.team.name)
    }))
    .sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

function normVPUG(raw) {
  // Proxy already returns [{name, logo, gp, w, d, l, gf, gc, gd, pts}, ...] sorted
  return raw.map(e => ({
    ...e,
    abbr: e.abbr || e.name.slice(0,3).toUpperCase(),
    us: /top.?secret/i.test(e.name)
  }));
}

const VPG_LOGO = 'https://virtualprogaming.com/cdn-cgi/imagedelivery/cl8ocWLdmZDs72LEaQYaYw/';
function normE11(raw) {
  // VPG API: [{team_name, team_abbr, team_logo, played, wins, draws, losses, score_for, score_against, points}, ...]
  return raw.map(e => {
    const name = e.team_name || e.name || '';
    const gf = e.score_for   ?? e.gf ?? 0;
    const gc = e.score_against ?? e.gc ?? 0;
    return {
      name,
      abbr: e.team_abbr || e.abbr || name.slice(0,3).toUpperCase(),
      logo: e.team_logo ? VPG_LOGO + e.team_logo + '/public' : (e.logo || null),
      gp:  e.played  ?? e.gp  ?? 0,
      w:   e.wins    ?? e.w   ?? 0,
      d:   e.draws   ?? e.d   ?? 0,
      l:   e.losses  ?? e.l   ?? 0,
      gf, gc,
      gd:  e.gd ?? (gf - gc),
      pts: e.points  ?? e.pts ?? 0,
      us: /top.?secret/i.test(name),
    };
  });
}

/* ── RENDER TABLE ── */
function renderTable(tableId, data, accentColor) {
  const table = document.getElementById(tableId);
  table.style.display = '';
  table.innerHTML = `
    <thead>
      <tr>
        <th style="width:36px">#</th>
        <th class="left" style="min-width:160px">Equipo</th>
        <th>PJ</th>
        <th>V</th>
        <th>E</th>
        <th>D</th>
        <th>GF</th>
        <th>GC</th>
        <th>DG</th>
        <th style="color:${accentColor}">PTS</th>
      </tr>
    </thead>
    <tbody></tbody>`;

  const tbody = table.querySelector('tbody');
  data.forEach((t, i) => {
    const pos = i + 1;
    const posClass = pos === 1 ? 'p1' : pos === 2 ? 'p2' : pos === 3 ? 'p3' : '';
    const gdClass = t.gd > 0 ? 'pos' : t.gd < 0 ? 'neg' : '';
    const rowClass = t.us ? 'highlight' : '';
    const logoHtml = t.logo
      ? `<img class="td-logo" src="${t.logo}" alt="${t.abbr}" onerror="this.style.display='none'">`
      : `<div class="td-logo" style="display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:900;color:#888">${t.abbr}</div>`;

    const tr = document.createElement('tr');
    if (rowClass) tr.className = rowClass;
    tr.innerHTML = `
      <td><div class="td-pos ${posClass}">${pos}</div></td>
      <td class="left">
        <div class="td-team">
          ${logoHtml}
          <span class="td-name ${t.us ? 'us' : ''}">${t.name}</span>
        </div>
      </td>
      <td>${t.gp}</td>
      <td>${t.w}</td>
      <td>${t.d}</td>
      <td>${t.l}</td>
      <td>${t.gf}</td>
      <td>${t.gc}</td>
      <td class="td-gd ${gdClass}">${t.gd > 0 ? '+' : ''}${t.gd}</td>
      <td><strong class="td-pts">${t.pts}</strong></td>`;
    tbody.appendChild(tr);
  });
}

/* ── SEASON SWITCH ── */
function switchSeason(season, btn) {
  document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('s-t1').style.display = season === 't1' ? '' : 'none';
  document.getElementById('s-t2').style.display = season === 't2' ? '' : 'none';
}

/* ── TAB SWITCH (per season) ── */
function switchTab(id, season, btn) {
  const container = document.getElementById('s-' + season);
  container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById(season + '-pane-' + id);
  if (pane) pane.classList.add('active');
  const tableId = season + '-' + id + '-table';
  const rows = document.querySelectorAll('#' + tableId + ' tbody tr');
  if (rows.length) gsap.fromTo(rows, {opacity:0, x:-8}, {opacity:1, x:0, duration:0.35, stagger:0.02, ease:'power2.out'});
}

/* ── RENDER T1 STATIC TABLES ── */
function renderT1() {
  renderTable('t1-vpn-table',  VPN_T1_DATA, 'var(--vpn)');
  renderTable('t1-vpug-table', VPUG_DATA,   'var(--vpug)');
  renderTable('t1-e11-table',  E11_DATA,    'var(--e11)');
  // Animate active pane (vpn); others will animate on tab switch
  gsap.to('#t1-vpn-table tbody tr', {opacity:1, duration:0.3, stagger:0.02, ease:'power1.out', delay:0.1});
  setTimeout(() => {
    document.querySelectorAll('#t1-vpug-table tbody tr, #t1-e11-table tbody tr').forEach(r => r.style.opacity = '1');
  }, 50);
}
